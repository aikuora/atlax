        spec_ref: null
        packages: ["crates/atlax-core"]
        status: pending

  - id: 1
    name: "Core TypeScript Implementation"
    status: pending
    tasks:
      - id: P1-01
        title: "Implement @atlax/core domain layer — all aggregate roots"
        description: >
          Implement all 10 aggregate root classes in
          packages/core/src/domain/ with their state machines, invariants,
          and domain events. Covers: Agent (with lifecycle INSTALLED/IDLE/
          ACTIVATED/EXECUTING/WAITING/DISABLED, circuit breaker, reputation
          threshold), Intent (lifecycle registered/matched/executing/completed/
          failed), AXUISchema (lifecycle emitted/validated/rendered/active/
          dismissed), Memory (lifecycle locked/unlocked/syncing), Permission
          (lifecycle declared/pending_approval/granted/revoked), AXPMessage
          (lifecycle created/queued/verified/delivered/expired), AgentPackage
          (lifecycle built/published/available/deprecated/installed),
          LLMProvider (lifecycle configured/available/degraded/exhausted),
          AuthSession (lifecycle unauthenticated/authenticated/expired/
          invalidated), AuditEntry. Each aggregate enforces its own state
          transition rules and throws typed DomainErrors for invalid transitions.
          Write unit tests for all state machines.
        spec_ref: null
        packages: ["packages/core"]
        status: pending

      - id: P1-02
        title: "Implement user_authentication use case"
        description: >
          Implement packages/core/src/application/identity/
          userAuthenticationUseCase.ts. Validates credentials, creates an
          AuthSession with UUID v7 session_id, sets expires_at > created_at,
          records audit log entry on success. On failure: no session created,
          authentication error returned. Implement IAuthProvider port and an
          in-memory adapter for testing. Write tests for all derived_tests in
          spec.yaml for this behavior.
        spec_ref: "behaviors.user_authentication"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-01"]

      - id: P1-03
        title: "Implement vault_unlock use case"
        description: >
          Implement packages/core/src/application/vault/vaultUnlockUseCase.ts.
          Accepts passphrase, derives AES-256-GCM key via Argon2id, transitions
          Memory from locked to unlocked, holds key in memory only (never
          writes to disk). Handles session.onExpiry = lock-vault (zeroes key on
          session expiry) and block-intents-only (keeps vault unlocked on
          session expiry). Implement ICryptoAdapter port with web SubtleCrypto
          adapter. Record audit log entry on unlock. Write tests for all
          derived_tests in spec.yaml for vault_unlock.
        spec_ref: "behaviors.vault_unlock"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-01", "P1-02"]

      - id: P1-04
        title: "Implement agent_registration use case"
        description: >
          Implement packages/core/src/application/agent/
          agentRegistrationUseCase.ts. Processes @Agent decorator and
          defineAgent() calls at startup. Validates unique name, valid
          permissions (rejects memory.read:* for user-defined agents), valid
          semver version. Generates Ed25519 key pair per agent instance.
          Sets agent state to INSTALLED. Transitions all permissions to
          pending_approval. Pre-computes intent embeddings for all @Intent
          patterns using the IEmbeddingService port (ONNX Runtime adapter).
          Registers @Hook subscriptions on the AXP bus. Registers cron
          triggers if declared. Write tests for all derived_tests in spec.yaml.
        spec_ref: "behaviors.agent_registration"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-01"]

      - id: P1-05
        title: "Implement permission_approval use case"
        description: >
          Implement packages/core/src/application/agent/
          permissionApprovalUseCase.ts. Presents permission dialog to user.
          On approval: transitions all permissions to granted, transitions
          agent from INSTALLED to IDLE, records audit log. On rejection or
          dialog dismiss: atomically aborts — no agent record, no permissions,
          no state persisted. The abort must be fully transactional (test that
          no partial state exists after rejection). Write tests for all
          derived_tests in spec.yaml.
        spec_ref: "behaviors.permission_approval"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-04"]

      - id: P1-06
        title: "Implement permission_check use case (Bastion)"
        description: >
          Implement packages/core/src/application/agent/permissionCheckUseCase.ts
          (the Bastion subsystem). Checks whether an agent holds a required
          permission at runtime on every operation. Evaluates hierarchical
          dotted-path permission strings including wildcards (memory.read:*,
          memory.read:<ns>.*). Returns boolean. Creates AuditEntry with result
          success or denied. On denial: throws PermissionDenied error. This use
          case is called by ALL other use cases that involve agent operations.
          Write tests for all derived_tests including wildcard matching and
          cross-namespace access.
        spec_ref: "behaviors.permission_check"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-05"]

      - id: P1-07
        title: "Implement intent_routing use case (Cortex)"
        description: >
          Implement packages/core/src/application/agent/intentRoutingUseCase.ts.
          Receives user natural-language input. Computes embedding similarity
          against all registered intent patterns using the IEmbeddingService
          port. Selects the highest-scoring intent above the match threshold.
          Tiebreaker logic: 1) agent reputation score, 2) alphabetical agent
          name. Parameter extraction from input per intent param_schema. If
          best-matching agent is WAITING: route to second-best or hold for up
          to 30 seconds. If no intent above threshold: no_match response. If
          required parameter missing: prompt user for clarification. Record
          intent classification in trace. Write tests for all derived_tests in
          spec.yaml including tiebreaker and WAITING agent hold scenarios.
        spec_ref: "behaviors.intent_routing"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-06"]

      - id: P1-08
        title: "Implement agent_execution use case with Web Worker sandbox"
        description: >
          Implement packages/core/src/application/agent/agentExecutionUseCase.ts
          and the WorkerSandboxAdapter in
          packages/core/src/infrastructure/sandbox/WorkerSandboxAdapter.ts.
          Transitions agent ACTIVATED -> EXECUTING. Loads AgentContext and
          memory namespace. Invokes intent handler in a Web Worker sandbox
          (ISandbox port). Enforces 30-second timeout via worker.terminate().
          On success: transitions to IDLE, resets consecutive_failure_count to 0,
          triggers reputation_update. On failure: increments
          consecutive_failure_count. Circuit breaker: on 3rd consecutive failure
          within failure_window_seconds, transitions to DISABLED. Creates
          AuditEntry (action, params, result, model, tokens, latency, cost).
          Emits OpenTelemetry spans. Handles AXUI schema return by calling
          Neo. Write tests for all derived_tests including timeout and circuit
          breaker scenarios.
        spec_ref: "behaviors.agent_execution"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-07"]

      - id: P1-09
        title: "Implement memory_read use case (Vault)"
        description: >
          Implement packages/core/src/application/vault/memoryReadUseCase.ts.
          Handles all four memory tier reads: working (in-memory Map),
          episodic (SQLite/OPFS via ISQLiteAdapter), semantic (HNSW via
          IVectorStoreAdapter), preferences (KV via IKVAdapter). Validates
          agent holds the required memory.read permission (delegates to
          permission_check). Validates Vault is unlocked or syncing. Decrypts
          episodic/semantic/preferences data in memory (AES-256-GCM). Returns
          empty result (not error) for missing keys/collections. Creates
          AuditEntry, increments vault_operations_total metric. Implements
          memory.foreign() cross-namespace access requiring explicit permission.
          Write tests for all derived_tests.
        spec_ref: "behaviors.memory_read"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-06", "P1-03"]

      - id: P1-10
        title: "Implement memory_write use case (Vault)"
        description: >
          Implement packages/core/src/application/vault/memoryWriteUseCase.ts.
          Handles all write operations: episodic store/update/delete, semantic
          store (generate local embedding via IEmbeddingService then store
          vector), working set, preferences set. Validates agent holds
          memory.write permission. Validates Vault is unlocked or syncing
          (writes proceed during sync — CRDT handles conflicts). Enforces
          storage limits (500 MB episodic, 100,000 vectors semantic). Encrypts
          data before writing. No partial write on encryption failure. Creates
          AuditEntry, updates vault_storage_bytes metric. Write tests for all
          derived_tests including limits, syncing sub-state, and encryption
          failure rollback.
        spec_ref: "behaviors.memory_write"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-09"]

      - id: P1-11
        title: "Implement axp_send use case"
        description: >
          Implement packages/core/src/application/messaging/axpSendUseCase.ts.
          Validates sender holds axp.send:<target> permission. Signs message
          with sender's Ed25519 key. Cortex verifies signature. Records
          REQUEST in audit log. If target is IDLE: forward immediately. If
          target is EXECUTING or WAITING: enqueue (max 50 per agent — on full
          queue, drop oldest with audit log warning, enqueue new). Returns
          RESPONSE to sender. If target is DISABLED: return axp.error
          AGENT_UNAVAILABLE immediately. TTL enforcement: drop message and
          return axp.error TIMEOUT if TTL expires before delivery. Agent cannot
          send to itself. MessagePack serialization for payloads. UUID v7 for
          message IDs. Write tests for all derived_tests including queue full,
          TTL expiry, and DISABLED target.
        spec_ref: "behaviors.axp_send"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-06", "P1-08"]

      - id: P1-12
        title: "Implement axp_broadcast use case"
        description: >
          Implement packages/core/src/application/messaging/axpBroadcastUseCase.ts.
          Validates sender holds axp.broadcast permission. Verifies Ed25519
          signature. Delivers event to all agents subscribed via @Hook for the
          event type. Records AuditEntry for the broadcast. On invalid signature
          or missing permission: event not broadcast, AuditEntry with result
          denied. Write tests for broadcast delivery and failure paths.
        spec_ref: "behaviors.axp_broadcast"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-11"]

      - id: P1-13
        title: "Implement axp_delegate use case"
        description: >
          Implement packages/core/src/application/messaging/axpDelegateUseCase.ts.
          Validates sender holds axp.send:<target> permission. Validates target
          is IDLE (not EXECUTING, WAITING, or DISABLED). Sends DELEGATE message.
          Target executes sub-task (IDLE -> ACTIVATED -> EXECUTING -> IDLE
          lifecycle). Returns DELEGATE_RESULT to originating agent. Supports
          concurrent delegation via Promise.all on ctx.axp.delegate. Records
          AuditEntry for DELEGATE and DELEGATE_RESULT. On target unavailable:
          axp.error AGENT_UNAVAILABLE. On timeout: axp.error TIMEOUT. Write
          tests for concurrent delegation and failure paths from spec.yaml.
        spec_ref: "behaviors.axp_delegate"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-11"]

      - id: P1-14
        title: "Implement llm_routing use case (Synapse)"
        description: >
          Implement packages/core/src/application/llm/llmRoutingUseCase.ts.
          Classifies request complexity (trivial/simple/moderate/complex).
          Trivial requests answered directly without LLM. Selects the least
          costly provider satisfying required capabilities and strategy
          constraints. Respects provider state (available/degraded/exhausted).
          Retry logic: up to 2 retries with exponential backoff before queuing.
          On budget exhaustion: route to local-only models. Records metrics
          (llm_tokens_total, llm_cost_total, llm_latency) and AuditEntry.
          Implement ILLMProvider port with AnthropicAdapter and OpenAIAdapter.
          Write tests for complexity routing, fallback chain, and budget
          exhaustion.
        spec_ref: "behaviors.llm_routing"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-06"]

      - id: P1-15
        title: "Implement budget_management use case (Synapse)"
        description: >
          Implement packages/core/src/application/llm/budgetManagementUseCase.ts.
          Tracks accumulated LLM spend against daily and monthly budget limits
          configured in defineRouter(). Updates cost counters after every LLM
          completion request. Edge-trigger alert at 80% (fires once per budget
          period when spend crosses from below 80% to at-or-above 80%). Degrades
          to local-only models at 100%. Daily counter resets at UTC 00:00;
          monthly counter resets on the first day of each UTC calendar month.
          onBudgetAlert callback registered in defineRouter() is invoked with
          (percentage, provider). Updates llm_cost_total metric. Write tests
          for alert edge trigger, exhaustion degradation, and counter resets.
        spec_ref: "behaviors.budget_management"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-14"]

      - id: P1-16
        title: "Implement audit_log_entry use case (Bastion)"
        description: >
          Implement packages/core/src/application/messaging/auditLogEntryUseCase.ts
          and the IAuditLog port. Appends a new AuditEntry with: UUID v7 id,
          SHA-256 previousHash (empty string for genesis entry), timestamp,
          agent fingerprint, action, params, result, optional LLM metadata,
          entry_hash (SHA-256 of full entry including previousHash), Ed25519
          signature by the acting agent. Retry policy: 3 retries with
          exponential backoff (1s, 2s, 4s). On total failure: transition agent
          to DISABLED, surface error via OpenTelemetry. The action result is
          NOT rolled back. Implement verify_chain and export methods. Write
          tests for hash chain integrity, tampering detection, and retry
          exhaustion.
        spec_ref: "behaviors.audit_log_entry"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-01"]

      - id: P1-17
        title: "Implement permission_revocation use case"
        description: >
          Implement packages/core/src/application/agent/
          permissionRevocationUseCase.ts. Changes permission status to revoked.
          If agent is EXECUTING or WAITING: always transitions to DISABLED.
          If agent is IDLE and revoked permission is required by at least one
          @Intent handler: transition to DISABLED. If agent is IDLE and
          permission is NOT required by any @Intent: agent stays IDLE, simply
          loses the capability. Cancels pending AXP messages from the agent on
          DISABLED transition. Records revocation in audit log. Write tests for
          all three revocation scenarios and for EXECUTING state.
        spec_ref: "behaviors.permission_revocation"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-06"]

      - id: P1-18
        title: "Implement reputation_update use case"
        description: >
          Implement packages/core/src/application/agent/reputationUpdateUseCase.ts.
          Triggered after every agent execution completion (success, error,
          cancelled). Updates metrics: intentSuccessRate, humanInterventionRate,
          errorRate, avgResponseTime, uptime. Recalculates combined score
          (0.0-1.0). If score drops below 0.2: automatically transition agent
          to DISABLED. Score is NOT reset when agent is disabled or re-enabled.
          If score crosses 0.5 boundary downward: emit system reputation warning
          via AXUI notification surface (bypassing agent execution pipeline, no
          agent permission required). On calculation failure: retain previous
          score, log metric error. Write tests for all derived_tests including
          auto-disable at 0.2 and score persistence across re-enable.
        spec_ref: "behaviors.reputation_update"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-08"]

      - id: P1-19
        title: "Implement defineAgent, defineConfig, defineRouter public APIs"
        description: >
          Implement the SDK public presentation layer in
          packages/core/src/presentation/functions/. defineConfig() initializes
          all subsystems (Cortex, Vault, Synapse, Neo, Bastion, Bridge) with
          the provided config. Validates encryption algorithm is aes-256-gcm,
          key derivation is argon2id, session.onExpiry is valid — throws at
          startup otherwise. Only one defineConfig() call allowed (second call
          throws). defineRouter() initializes Synapse with providers and
          strategies. defineAgent() registers an AgentDefinition equivalent to
          @Agent. Validate all inputs with Zod at the presentation boundary.
        spec_ref: null
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-04", "P1-14"]

      - id: P1-20
        title: "Implement @Agent, @Intent, @Hook, @Guard, @Tool decorators"
        description: >
          Implement TypeScript decorators in packages/core/src/presentation/
          decorators/. @Agent: registers class as agent, calls defineAgent()
          internally — produces identical AgentDefinition at runtime. @Intent:
          marks method with patterns and param_schema, pre-computes embeddings.
          @Hook: subscribes method to AXP event bus for named event. @Guard:
          registers method as pre-action guard (executes in declaration order,
          blocks action if it throws). @Tool: declares MCP tool binding,
          validates tools.<name> permission is declared. All decorators use the
          stage 3 TC39 decorator API. Write tests verifying
          defineAgent-and-@Agent runtime equivalence.
        spec_ref: null
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-19"]

      - id: P1-21
        title: "Implement AgentContext and ctx.* API surface"
        description: >
          Implement packages/core/src/presentation/context/AgentContext.ts.
          Exposes ctx.memory (working_get, working_set, working_clear, store,
          query, update, delete, semanticStore, semanticSearch, preferences_get,
          preferences_set, foreign), ctx.axp (send, emit, on, cancel,
          delegate), ctx.llm (complete with complexity hint), ctx.ui (render),
          ctx.tools (invoke). Each ctx method delegates to the corresponding
          application use case through the DI container. The context is
          constructed fresh per execution and is scoped to the executing agent's
          namespace.
        spec_ref: null
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-09", "P1-10", "P1-11", "P1-14"]

      - id: P1-22
        title: "Implement @atlax/prompt-guard package"
        description: >
          Implement the full packages/prompt-guard package. detectInjection():
          analyzes text for prompt injection patterns (jailbreak attempts,
          instruction overrides, system prompt leakage patterns). sanitize():
          returns a sanitized version of the response or a blocked error if
          injection is detected. Used internally by @atlax/bridge before
          returning MCP tool responses to agents. Must be independently usable
          without @atlax/core. Write unit tests for injection detection and
