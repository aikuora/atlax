          vitest run.
        spec_ref: null
        packages: ["vitest.workspace.ts", "packages/*/vitest.config.ts"]
        status: pending

      - id: P0-08
        title: "Configure lefthook and commitlint"
        description: >
          Create lefthook.yml at the repo root with pre-commit hook running
