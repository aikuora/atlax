domain: "Atlax SDK"
description: >
  Atlax is an open-source framework (MIT) for building agent-first operating
  systems. The developer surface is TypeScript; the core engine (Cortex, AXP,
  Bastion, Vault, Synapse) is implemented in Rust and compiled to WebAssembly.
  Specialized intelligent agents accompany users throughout their day, understand
  their interests and preferences, and deliver dynamically generated interfaces
  (micro-apps) via declarative AXUI schemas. Atlax handles all orchestration,
  encrypted local memory, optimal LLM selection, sandboxed execution, UI
  rendering, audit logging, and marketplace distribution — so the developer only
  writes domain and business logic.

archetype: framework

# =============================================================================
# LAYER 1: WORLD MODEL
# =============================================================================

consumers:
  developer:
    description: >
      TypeScript developer building agent-first applications on top of Atlax.
      Uses decorators (@Agent, @Intent, @Hook, @Guard, @Tool), defineConfig(),
      defineRouter(), defineDashboard(), and CLI commands to define agents and
      deploy applications.
    can:
      - "Define agents using the functional defineAgent() API (recommended) or the equivalent decorator syntax (@Agent, @Intent)"
      - "Define agents with @Agent decorator and a manifest (name, version, description, permissions)"
      - "Declare intents with @Intent and natural-language pattern lists"
      - "Register hooks that react to system or inter-agent events"
      - "Register guards that run before any agent action"
      - "Configure LLM routing strategies, budget limits, and budget alert callbacks via defineRouter()"
      - "Register custom AXUI components via registerComponent()"
      - "Configure the dashboard layout, prioritization rules, and pinned widgets via defineDashboard()"
      - "Define MCP tool servers in atlax.config.ts"
      - "Configure the session expiry behavior (lock-vault or block-intents-only) via defineConfig()"
      - "Write agent tests using @atlax/testing (testAgent, mockMemory, mockLLM, mockTool)"
      - "Run CLI commands: dev, build, agent create, agent test, agent audit, publish, doctor"
      - "Publish packaged agents to the Zion marketplace"
      - "Self-host a Zion registry"
    cannot:
      - "Access another agent's memory namespace without declaring an explicit cross-namespace permission"
      - "Bypass the Bastion permission check at runtime"
      - "Emit raw HTML or JavaScript from an agent — only AXUI schemas are allowed"
      - "Choose the specific LLM model for a request — Synapse selects it based on complexity"
      - "Disable the immutable audit log"
      - "Ship an agent to the marketplace without a signed manifest and SHA-256 code hash"

  publisher:
    description: >
      Developer or organization that packages and distributes agents via the
      Zion marketplace. Has a cryptographic key pair that signs agent manifests,
      establishing a trust chain for end-users who install their agents.
    can:
      - "Sign agent manifests with their Ed25519 publisher key"
      - "Upload packaged agents (.axpkg) to Zion with metadata"
      - "Trigger static security analysis on publish"
      - "Receive aggregated (anonymous, opt-in) marketplace reputation scores"
      - "Become a verified publisher after security audits"
      - "Deprecate a published package (transitions it to 'deprecated' state)"
    cannot:
      - "Publish an agent without a valid Ed25519 signature on the manifest"
      - "Alter the SHA-256 code hash after signing"
      - "Access user data or audit logs from installed agent instances"
      - "Force-update or disable installed agent instances on user devices"

  end_user:
    description: >
      Person using an Atlax-powered application. Interacts through the Ambient
      Dashboard (visual micro-apps), chat/text input, and voice input. Controls
      which agents are installed and what permissions they hold.
    can:
      - "Authenticate to the application via the built-in auth module"
      - "Install agents from the Zion marketplace after reviewing permissions"
      - "Approve or reject the permission set declared in an agent manifest"
      - "Revoke any individual permission from any installed agent at any time"
      - "Disable or uninstall any agent"
      - "Re-enable a disabled agent by re-approving its permissions via the permission dialog"
      - "Opt-in to encrypted cloud sync for their data"
      - "Export their complete audit log and verify its integrity independently"
      - "Pin widgets to their dashboard and interact with micro-apps"
      - "Provide ratings and feedback for installed agents (local, not shared without consent)"
    cannot:
      - "Read or modify another user's encrypted Vault data"
      - "Grant an agent permissions that the agent did not declare in its manifest"
      - "See decrypted data from the cloud sync server"
      - "Auto-restore previously granted permissions when re-enabling an agent — must explicitly re-approve"

  system:
    description: >
      The Atlax runtime itself (Cortex, Bastion, Synapse, Vault, Neo, Bridge).
      Acts as an automated actor for background flows such as intent routing,
      lifecycle management, audit logging, and budget enforcement.
    can:
      - "Route user intents to the correct agent"
      - "Manage agent lifecycle transitions"
      - "Enforce permissions on every agent operation"
      - "Append signed entries to the immutable audit log"
      - "Select the optimal LLM for each task"
      - "Enforce LLM budget limits and degrade to local models on exhaustion"
      - "Automatically disable agents whose reputation score falls below 0.2"
      - "Automatically disable agents with 3 or more consecutive failures within 5 minutes"
      - "Queue AXP messages for agents that are currently EXECUTING or WAITING (max 50 per agent)"
      - "Cancel pending AXP requests via CANCEL message"
      - "Kill agent execution after 30 seconds"
      - "Emit system-level AXUI notification surface alerts (bypassing agent permission pipeline)"
    cannot:
      - "Decrypt Vault data without the user's derived key"
      - "Modify or delete audit log entries"
      - "Forward an AXP message without verifying the sender's Ed25519 signature"
      - "Grant permissions not declared in the agent's manifest"

# =============================================================================
# ENTITIES
# =============================================================================

abstractions:
  Agent:
    description: >
      Autonomous entity with a cryptographic Ed25519 identity, isolated memory
      namespace, declared permissions, and lifecycle managed by Cortex. Each
      agent processes user intents, emits AXUI schemas, communicates with other
      agents via AXP, and has its every action recorded in the audit log.
      A circuit breaker prevents runaway failures: 3 consecutive failures within
      5 minutes automatically disables the agent.
    lifecycle:
      - "INSTALLED"
      - "IDLE"
      - "ACTIVATED"
      - "EXECUTING"
      - "WAITING"
      - "DISABLED"
    thread_safety: "documented"
    interface:
      handleIntent:
        signature: "(intentName: string, params: Record<string, unknown>) -> Promise<AgentResult>"
        description: "Process a matched intent with extracted parameters"
      onHook:
        signature: "(eventName: string, ctx: AgentContext) -> Promise<void>"
        description: "React to a system or inter-agent event"
      onSchedule:
        signature: "(cronExpression: string, ctx: AgentContext) -> Promise<void>"
        description: "Execute a scheduled background task"

    attributes:
      name:
        type: string
        required: true
        constraints: "Unique within the Cortex registry. Lowercase alphanumeric and hyphens only. Max 64 characters."
      version:
        type: string
        required: true
        constraints: "Semantic version string (e.g. 1.0.0)"
      description:
        type: string
        required: true
        constraints: "Max 512 characters"
      author:
        type: string
        required: true
        constraints: "Non-empty string identifying the publisher"
      public_key:
        type: string
        required: true
        constraints: "32-byte Ed25519 public key, base64-encoded. Generated at installation time."
      fingerprint:
        type: string
        required: true
        constraints: "Human-readable format: axag:xxxx:xxxx:xxxx:xxxx. Derived from public key."
      permissions:
        type: string
        required: true
        constraints: "Non-empty list of Permission strings declared in the manifest. Must not include permissions not in the allowed set."
      capabilities:
        type: string
        required: false
        constraints: "List of capability strings (e.g. 'reasoning', 'vision'). Optional."
      reputation_score:
        type: decimal
        required: true
        constraints: "Range 0.0 to 1.0. Calculated from intentSuccessRate, humanInterventionRate, errorRate, avgResponseTime, uptime, and user feedback. Score persists when the agent is disabled — it is NOT reset on re-enable."
        default: "0.8"
      state:
        type: enum
        required: true
        values: ["INSTALLED", "IDLE", "ACTIVATED", "EXECUTING", "WAITING", "DISABLED"]
        default: "INSTALLED"
      code_hash:
        type: string
        required: true
        constraints: "SHA-256 hex digest of the agent's code bundle. Verified at installation."
      manifest_signature:
        type: string
        required: true
        constraints: "Ed25519 signature of the manifest payload by the publisher's key."
      signed_by:
        type: string
        required: false
        constraints: "Publisher fingerprint. Present for marketplace agents; absent for locally-defined agents."
      consecutive_failure_count:
        type: integer
        required: true
        constraints: "Count of consecutive execution failures. Resets to 0 on any successful execution. Non-negative integer."
        default: "0"
      failure_window_seconds:
        type: integer
        required: true
        constraints: "Time window in seconds for the circuit breaker. Failures outside this window do not count toward consecutive_failure_count."
        default: "300"

    transitions:
      INSTALLED:
        - to: "IDLE"
          when: "User approves all declared permissions via the permission dialog"
          actor: "end_user"
        - to: "DISABLED"
          when: "User denies permissions or uninstalls agent"
          actor: "end_user"
      IDLE:
        - to: "ACTIVATED"
          when: "Cortex matches an incoming intent, hook event, or cron schedule to this agent"
          actor: "system"
        - to: "DISABLED"
          when: >
            User disables the agent, system detects reputation score below 0.2,
            or a permission is revoked that is required by at least one @Intent
            handler declared by the agent
          actor: "end_user or system"
      ACTIVATED:
        - to: "EXECUTING"
          when: "Agent context and memory are loaded and execution begins"
          actor: "system"
      EXECUTING:
        - to: "WAITING"
          when: "Agent pauses awaiting user confirmation or an external tool response"
          actor: "system"
        - to: "IDLE"
          when: "Execution completes successfully"
          actor: "system"
        - to: "DISABLED"
          when: >
            Execution exceeds 30-second timeout, consecutive_failure_count reaches 3
            within failure_window_seconds, or a permission required by the executing
            intent is revoked mid-execution
          actor: "system"
      WAITING:
        - to: "EXECUTING"
          when: "User confirms or tool response arrives"
          actor: "end_user or system"
        - to: "IDLE"
          when: "User cancels the pending action"
          actor: "end_user"
        - to: "DISABLED"
          when: "A required permission is revoked while waiting"
          actor: "end_user"
      DISABLED:
        - to: "IDLE"
          when: "User re-enables the agent and explicitly re-approves all permissions via the permission dialog"
          actor: "end_user"

    rules:
      - "An agent MUST NOT read or write another agent's memory namespace unless it declares the exact cross-namespace permission in its manifest and the user has approved it."
      - "An agent MUST NOT communicate directly with another agent — all inter-agent messages go through the Cortex AXP bus."
      - "An agent's Ed25519 key pair is generated at installation time and is unique per installed instance."
      - "An agent with reputation score below 0.5 requires user confirmation for more operations than normal."
      - "An agent with reputation score below 0.2 is automatically disabled by the system."
      - "An agent MUST sign every AXP message it sends with its Ed25519 private key."
      - "An agent's execution is killed by the sandbox after 30 seconds with no completion."
      - "A guard decorated with @Guard runs before every action on the agent. If it throws, the action is blocked."
      - "A hook decorated with @Hook(eventName) is invoked when that event is broadcast on the AXP bus."
      - "An agent can give a complexity hint ('trivial'|'simple'|'moderate'|'complex') to Synapse, but the final model selection belongs to Synapse."
      - "Circuit breaker: if consecutive_failure_count reaches 3 within failure_window_seconds (default 5 minutes), the agent transitions to DISABLED. consecutive_failure_count resets to 0 on every successful execution."
      - "Reputation score persists at its last value when an agent is disabled. It is NOT reset when the agent is re-enabled."
      - "System reputation warnings (score crossing below 0.5 boundary) are emitted by Cortex using the AXUI notification surface, bypassing the normal agent execution pipeline and requiring no agent permission."
      - "The sandbox type is derived at execution time from identity.signedBy: if identity.signedBy is populated (agent was installed from the marketplace with a publisher's Ed25519 signature), the agent runs in the WASM sandbox (browser WebAssembly API or native Wasmtime); if identity.signedBy is absent (locally defined developer agent), the agent runs in a Web Worker sandbox (or WASM sandbox when running a production build)."

  Intent:
    description: >
      A declared user-intent handler within an agent. Matched by Cortex using
      embedding-based similarity against the user's natural-language input.
      Carries a parameter schema that Cortex uses to extract structured data
      from the raw input before invoking the agent method.
    lifecycle:
      - "registered"
      - "matched"
      - "executing"
      - "completed"
      - "failed"
    thread_safety: "documented"
    interface:
      match:
        signature: "(userInput: string) -> Promise<{ score: number; params: Record<string, unknown> }>"
        description: "Compute similarity score and extract parameters from raw user input"

    attributes:
      patterns:
        type: string
        required: true
        constraints: "Non-empty list of natural-language example strings used to generate embeddings for matching."
      params_schema:
        type: string
        required: false
        constraints: "JSON Schema-compatible object defining parameter names, types, and required flags."
      agent_name:
        type: string
        required: true
        constraints: "Name of the agent that owns this intent."

    rules:
      - "Intent matching uses embedding similarity — the highest-scoring intent above the matching threshold wins."
      - "If two intents from different agents score equally, Cortex uses agent reputation score as the first tiebreaker."
      - "If two intents score equally AND the owning agents' reputation scores are also equal, the final tiebreaker is alphabetical by agent name (ascending)."
      - "Parameter extraction runs on the winning intent before the agent method is invoked."
      - "A required parameter that cannot be extracted causes Cortex to ask the user for clarification before routing."
      - "If the best-matching agent is in WAITING state, Cortex routes to the second-best matching agent instead."
      - "If no second-best agent exists and the best-matching agent is WAITING, Cortex holds the intent for up to 30 seconds waiting for the agent to return to IDLE. If still WAITING after 30 seconds, an error is returned to the user ('Agent is busy, please try again')."

  AXUISchema:
    description: >
      A declarative JSON document emitted by an agent describing a user interface
      unit (micro-app). The Neo renderer converts it into platform-native
      components (React on web, React Native on mobile). An AXUI schema cannot
      execute arbitrary code — it is a data document only.
      TTL expiry removes the micro-app from the dashboard and creates an audit
      entry; refresh re-invokes the originating intent to replace the schema.
      A persistent micro-app (persistent: true) survives session changes but is
      removed when the owning agent is DISABLED, uninstalled, the user explicitly
      dismisses it, or the Vault transitions to 'locked'.
    lifecycle:
      - "emitted"
      - "validated"
      - "rendered"
      - "active"
      - "dismissed"
    lifecycle_note: >
      AXUISchema lifecycle states are behavioral contracts. Specifically: a schema
      in 'dismissed' state must not be rendered or acted on; a schema in 'emitted'
      state has not yet been validated by Neo; a schema in 'rendered' state is
      actively displayed.
    thread_safety: "not-thread-safe"
    interface:
      validate:
        signature: "(schema: unknown) -> ValidationResult"
        description: "Validate the schema against the AXUI 1.0 JSON Schema"
      render:
        signature: "(schema: AXUISchema, theme: Theme) -> ReactElement | ReactNativeElement"
        description: "Resolve theme tokens, map nodes to components, bind data, wire actions"

    attributes:
      schema_version:
        type: string
        required: true
        constraints: "Must be 'axui/1.0'"
      id:
        type: string
        required: true
        constraints: "Unique identifier for this micro-app instance."
      agent:
        type: string
        required: true
        constraints: "Name of the agent that emitted this schema."
      intent:
        type: string
        required: true
        constraints: "Name of the intent that originated this schema."
      timestamp:
        type: integer
        required: true
        constraints: "Unix timestamp in milliseconds."
      surface:
        type: enum
        required: true
        values: ["card", "sheet", "fullscreen", "widget", "notification", "inline"]
      priority:
        type: enum
        required: true
        values: ["low", "medium", "high", "urgent"]
      root:
        type: string
        required: true
        constraints: "Root AXUINode. Must be one of the 17 valid node types."
      actions:
        type: string
        required: false
        constraints: "List of AXUIAction objects. Each action.type must be one of the 9 valid action types."
      state:
        type: string
        required: false
        constraints: "Key-value map for local micro-app state. Values are JSON-serializable."
      bindings:
        type: string
        required: false
        constraints: "List of AXUIBinding objects for real-time data binding."
      ttl:
        type: integer
        required: false
        constraints: "Auto-dismiss after N milliseconds. Must be positive. On expiry: micro-app is removed, an AXUI 'dismiss' event is sent to Cortex, an audit entry is created with action 'micro_app_dismissed' and reason 'ttl_expired'. The owning agent is NOT re-invoked."
      refresh:
        type: integer
        required: false
        constraints: "Auto-refresh interval in milliseconds. Must be positive. On each interval: the originating intent handler is re-invoked with the same parameters, and the result replaces the existing schema in the dashboard."
      persistent:
        type: boolean
        required: false
        constraints: "If true, micro-app survives session changes (logout/login) as long as the Vault is unlocked and the agent is active. Removed only when: owning agent is DISABLED or uninstalled, user explicitly dismisses it, or Vault transitions to 'locked'."
        default: "false"

    rules:
      - "An AXUI schema MUST NOT contain executable code (no script tags, no JSX, no eval)."
      - "A schema with an invalid node type is rejected by the Neo renderer before display."
      - "Colors in style objects MUST use semantic tokens (e.g. 'primary', 'surface') — not raw hex values."
      - "The fullscreen surface type requires the agent to have the 'ui.fullscreen' permission."
      - "The notification surface type requires the agent to have the 'ui.notify' permission."
      - "An action of type 'agent.invoke' invokes the target agent's intent through Cortex, not directly."
      - "Node types: text, stack, card, chart, form, table, image, map, list, progress, metric, codeblock, markdown, divider, spacer, conditional, loop (17 total)."
      - "Chart types: line, bar, pie, donut, area, scatter."
      - "Form input types: text, number, date, select, toggle, slider, textarea."
      - "On TTL expiry: the micro-app is removed from the dashboard surface, an AXUI 'dismiss' event is sent to Cortex, and an AuditEntry is created with action 'micro_app_dismissed' and reason 'ttl_expired'. The owning agent is NOT re-invoked."
      - "On refresh interval: the originating intent handler is re-invoked with the same agent, intent name, and original parameters. The new schema replaces the existing one in the dashboard."

  Memory:
    description: >
      The 4-tier encrypted local-first memory system (Vault) available to each
      agent within its own namespace. Tiers: working (session-scoped in-memory),
      episodic (persistent SQLite/OPFS, encrypted), semantic (vector store with
      local embeddings), and preferences (encrypted KV, optionally syncable).
      All tiers are encrypted at rest with AES-256-GCM; the key is derived from
      the user's passphrase via Argon2id and never leaves the device.
      'syncing' is a sub-state of 'unlocked' — local writes proceed normally
      during a sync cycle; CRDT handles conflicts on the next sync cycle.
    lifecycle:
      - "locked"
      - "unlocked"
      - "syncing"
    thread_safety: "documented"
    interface:
      working_get:
        signature: "(key: string) -> Promise<unknown>"
        description: "Get a value from working (session) memory"
      working_set:
        signature: "(key: string, value: unknown) -> Promise<void>"
        description: "Set a value in working memory"
      working_clear:
        signature: "() -> Promise<void>"
        description: "Clear all working memory for this session"
      store:
        signature: "(collection: string, document: Record<string, unknown>) -> Promise<string>"
        description: "Store a document in episodic memory; returns the document ID"
      query:
        signature: "(collection: string, filter: QueryFilter) -> Promise<Document[]>"
        description: "Query episodic memory with a filter"
      update:
        signature: "(collection: string, id: string, patch: Partial<Document>) -> Promise<void>"
        description: "Update a document in episodic memory"
      delete:
        signature: "(collection: string, id: string) -> Promise<void>"
        description: "Delete a document from episodic memory"
      semanticStore:
        signature: "(namespace: string, text: string, metadata?: Record<string, unknown>) -> Promise<string>"
        description: "Embed text locally and store the vector in semantic memory"
      semanticSearch:
        signature: "(namespace: string, query: string, topK?: number) -> Promise<SemanticResult[]>"
        description: "Find the topK most semantically similar stored texts"
      preferences_get:
        signature: "(key: string) -> Promise<unknown>"
        description: "Read a preference value"
      preferences_set:
        signature: "(key: string, value: unknown) -> Promise<void>"
        description: "Write a preference value"
      foreign:
        signature: "(agentName: string) -> { query, semanticSearch }"
        description: "Access another agent's memory (requires explicit cross-namespace permission)"

    attributes:
      agent_namespace:
        type: string
        required: true
        constraints: "Matches the agent's declared name. Automatically scoped — agent cannot escape this namespace."
      working_max_size:
        type: string
        required: true
        constraints: "50 MB maximum. Evicted on session close."
        default: "50MB"
      episodic_max_size:
        type: string
        required: true
        constraints: "500 MB maximum."
        default: "500MB"
      episodic_retention:
        type: string
        required: true
        constraints: "Configurable by user. Default 1 year."
        default: "1y"
      semantic_dimensions:
        type: integer
        required: true
        constraints: "Exactly 384 dimensions (all-MiniLM-L6-v2 model output)."
        default: "384"
      semantic_max_vectors:
        type: integer
        required: true
        constraints: "Maximum 100,000 vectors per agent namespace."
        default: "100000"
      encryption_algorithm:
        type: string
        required: true
        constraints: "Must be AES-256-GCM."
        default: "aes-256-gcm"
      key_derivation:
        type: string
        required: true
        constraints: "Must be Argon2id."
        default: "argon2id"
      sync_enabled:
        type: boolean
        required: true
        constraints: "Default false. Only the user can activate this — not the developer or agent."
        default: "false"
      sync_strategy:
        type: enum
        required: false
        values: ["crdt", "last-write-wins"]
        default: "crdt"
      sync_encryption:
        type: string
        required: false
        constraints: "Must be 'e2e' when sync is enabled. The sync server never sees plaintext data."
        default: "e2e"

    transitions:
      locked:
        - to: "unlocked"
          when: "User provides the correct passphrase and the key is derived successfully"
          actor: "end_user"
      unlocked:
        - to: "syncing"
          when: "Cloud sync is enabled and a sync cycle begins"
          actor: "system"
        - to: "locked"
          when: "Session expires with session.onExpiry = lock-vault, user explicitly logs out, or device locks"
          actor: "system or end_user"
      syncing:
        - to: "unlocked"
          when: "Sync cycle completes (success or failure)"
          actor: "system"
        - to: "locked"
          when: "Session expires with session.onExpiry = lock-vault or user explicitly logs out during sync"
          actor: "system or end_user"

    rules:
      - "Working memory is lost when the session closes — it is never persisted to disk."
      - "Episodic memory is encrypted before writing to SQLite/OPFS. The plaintext never touches persistent storage."
      - "Semantic embeddings are generated locally on-device using ONNX Runtime — no text is sent to an external server for embedding."
      - "The local embedding model (all-MiniLM-L6-v2, ~25 MB) is downloaded on demand the first time semantic memory is used."
      - "An agent calling memory.foreign(otherAgent) without declaring the corresponding cross-namespace permission in its manifest throws PermissionDenied."
      - "Cloud sync is end-to-end encrypted: the sync server stores only opaque encrypted blobs and never holds the user's key."
      - "When sync is enabled, CRDT is the recommended conflict strategy; last-write-wins is an opt-in simpler alternative."
      - "Only the preferences tier is syncable; episodic and semantic tiers are local-only in v1."
      - "'syncing' is a sub-state of 'unlocked'. Local reads and writes proceed normally while a sync cycle is in progress. The CRDT merge strategy resolves any conflicts that arise on the next sync cycle."

  Permission:
    description: >
      A granular, hierarchical string that declares what an agent is allowed to
      do. Permissions follow a dotted-path format with optional wildcards.
      They are declared in the agent manifest, approved by the user at install
      time, and verified by Bastion on every operation at runtime.
    lifecycle:
      - "declared"
      - "pending_approval"
      - "granted"
      - "revoked"
    thread_safety: "thread-safe"
    interface:
      check:
        signature: "(agentId: string, requiredPermission: Permission) -> boolean"
        description: "Return true if the agent holds the given permission"

    attributes:
      value:
        type: string
        required: true
        constraints: >
          Must match one of the allowed patterns:
          memory.read:*, memory.read:<ns>.*, memory.read:<ns>.<col>,
          memory.write:<ns>.*, tools.<name>, ui.render, ui.notify, ui.fullscreen,
          network.<domain>, network.*, axp.send:<agentName>, axp.broadcast,
          schedule.cron, clipboard.read, clipboard.write,
          location.read, camera.read, microphone.read.
      agent_name:
        type: string
        required: true
        constraints: "Agent that holds or is requesting this permission."
      status:
        type: enum
        required: true
        values: ["declared", "pending_approval", "granted", "revoked"]

    transitions:
      declared:
        - to: "pending_approval"
          when: "agent_registration completes and the agent reaches INSTALLED state — the framework presents the permission dialog on next user interaction"
          actor: "system"
      pending_approval:
        - to: "granted"
          when: "User approves the permission in the permission dialog"
          actor: "end_user"
        - to: "revoked"
          when: "User rejects the permission in the permission dialog"
          actor: "end_user"
      granted:
        - to: "revoked"
          when: "User explicitly revokes the permission"
          actor: "end_user"
      revoked:
        - to: "pending_approval"
          when: "User re-enables a DISABLED agent — all previously revoked permissions go back to pending_approval and must be explicitly re-approved in the permission dialog"
          actor: "end_user"
        - to: "pending_approval"
          when: "User opens agent settings and approves the permission dialog for a specific revoked permission on an active (non-DISABLED) agent"
          actor: "end_user"

    rules:
      - "memory.read:* is reserved for system agents only — user-defined agents cannot request it."
      - "A user can revoke any granted permission at any time without uninstalling the agent."
      - "Revoking a permission while the agent is EXECUTING or WAITING always transitions the agent to DISABLED."
      - "Revoking a permission from an IDLE agent: if the revoked permission is required by at least one @Intent handler declared by the agent, the agent transitions to DISABLED; if the permission was not required by any declared @Intent handler, the agent stays IDLE and simply loses that capability."
      - "An agent that attempts an operation without the required permission receives a PermissionDenied error, which is recorded in the audit log."
      - "Permissions are checked by Bastion at runtime on every operation — it is not sufficient to check only at install time."
      - "When a user re-enables a disabled agent, previously revoked permissions return to pending_approval state and must be explicitly re-approved in the permission dialog — they are not automatically re-granted."
      - "A user may re-grant a revoked permission to an IDLE or WAITING agent directly from agent settings without disabling and re-enabling the agent. The permission transitions revoked -> pending_approval -> granted via the same permission approval flow."

  AXPMessage:
    description: >
      A message in the Atlax Exchange Protocol (AXP), the intra-system
      inter-agent communication protocol. All messages flow through the Cortex
      AXP bus (in-memory). Messages are serialized with MessagePack and signed
      with the sender agent's Ed25519 key. Never traverses the network.
      Messages sent to an EXECUTING or WAITING target are queued externally by
      Cortex (max 50 per agent). When the target returns to IDLE, Cortex
      delivers the oldest queued message and triggers a fresh activation cycle.
    lifecycle:
      - "created"
      - "queued"
      - "verified"
      - "delivered"
      - "expired"
    thread_safety: "thread-safe"
    interface:
      send:
        signature: "(message: AXPMessage) -> Promise<AXPMessage>"
        description: "Send a point-to-point message; awaits the response"
      emit:
        signature: "(event: AXPEvent) -> void"
        description: "Publish a broadcast event (fire-and-forget)"
      on:
        signature: "(eventType: string, handler: AXPEventHandler) -> Unsubscribe"
        description: "Subscribe to broadcast events of a given type"
      cancel:
        signature: "(correlationId: string) -> void"
        description: "Cancel a pending request or delegation"

    attributes:
      id:
        type: string
        required: true
        constraints: "UUID v7 (timestamp-ordered). Generated by the sender."
      type:
        type: enum
        required: true
        values:
          - "axp.request"
          - "axp.response"
          - "axp.error"
          - "axp.event"
          - "axp.delegate"
          - "axp.delegate_result"
          - "axp.cap_query"
          - "axp.cap_resp"
          - "axp.heartbeat"
          - "axp.cancel"
      source:
        type: string
        required: true
        constraints: "Sender agent's fingerprint."
      target:
        type: string
        required: false
        constraints: "Recipient agent's fingerprint, or '*' for broadcast. Required for request/delegate types."
      timestamp:
        type: integer
        required: true
        constraints: "Unix timestamp in milliseconds."
      payload:
        type: string
        required: true
        constraints: "Arbitrary MessagePack-serializable data."
      signature:
        type: string
        required: true
        constraints: "Ed25519 signature of the complete message by the sender's private key."
      ttl:
        type: integer
        required: false
        constraints: "Time-to-live in milliseconds. Default 30000 (30 seconds)."
        default: "30000"
      correlation_id:
        type: string
        required: false
        constraints: "Present on responses and delegate_result messages. Links to the originating request id."

    rules:
      - "Cortex verifies the Ed25519 signature of every incoming AXP message before forwarding. A message with an invalid signature is dropped and the attempt is recorded in the audit log."
      - "Cortex checks that the sender agent has the axp.send:<target> or axp.broadcast permission before forwarding."
      - "All inter-agent communications (request, response, event, delegate) are recorded in the audit log."
      - "A message whose TTL expires before delivery is dropped; the sender receives an axp.error with reason TIMEOUT."
      - "Parallel delegation via Promise.all on ctx.axp.delegate is a supported and documented pattern."
      - "An agent cannot send an AXP message to itself."
      - "If the target agent is currently EXECUTING or WAITING, Cortex queues the message externally. The queue holds a maximum of 50 messages per target agent. If the queue is full, the oldest message is dropped with a warning logged to the audit log, and the new message is enqueued."
      - "When a target agent returns to IDLE from EXECUTING or WAITING, Cortex delivers the next queued message and triggers a fresh IDLE -> ACTIVATED -> EXECUTING cycle. Queued messages are NOT concurrent executions — they are sequential."

  AgentPackage:
    description: >
      A distributable artifact (.axpkg) containing an agent's code bundle,
      signed manifest, and metadata. Published to the Zion marketplace and
      verified cryptographically before installation.
    lifecycle:
      - "built"
      - "published"
      - "available"
      - "deprecated"
      - "installed"
    thread_safety: "not-thread-safe"
    interface:
      verify:
        signature: "(pkg: AgentPackage) -> Promise<VerificationResult>"
        description: "Verify publisher signature and code hash"

    attributes:
      package_id:
        type: string
        required: true
        constraints: "Globally unique identifier in the Zion registry."
      agent_name:
        type: string
        required: true
        constraints: "Matches the agent manifest name."
      version:
        type: string
        required: true
        constraints: "Semantic version string."
      code_bundle:
        type: string
        required: true
        constraints: "Compiled agent code."
      code_hash:
        type: string
        required: true
        constraints: "SHA-256 hex digest of code_bundle. Must match manifest payload hash."
      manifest:
        type: string
        required: true
        constraints: "SignedManifest object containing name, version, description, author, permissions, capabilities, and code_hash."
      manifest_signature:
        type: string
        required: true
        constraints: "Ed25519 signature of the manifest payload by the publisher's key."
      publisher_key:
        type: string
        required: true
        constraints: "Publisher's Ed25519 public key. Used to verify manifest_signature."
      security_analysis_passed:
        type: boolean
        required: true
        constraints: "True if static security analysis found no issues. Must be true for public listing."
      marketplace_score:
        type: decimal
        required: false
        constraints: "Aggregated score 0.0–1.0. Present after sufficient adoption."

    transitions:
      built:
        - to: "published"
          when: "atlax publish is invoked, security analysis passes, and the package is uploaded to Zion"
          actor: "publisher"
      published:
        - to: "available"
          when: "Zion completes server-side verification and lists the package"
          actor: "system"
      available:
        - to: "deprecated"
          when: "Publisher or Zion admin explicitly deprecates the package"
          actor: "publisher or system"
      deprecated:
        - to: "available"
          when: "Publisher or Zion admin reverses the deprecation"
          actor: "publisher or system"
          note: >
            Follows the same actor and pre_conditions as agent_deprecate in reverse.
            The publisher who deprecated the package may undeprecate it.
            Side effects: all installed instances have their deprecation warning
            cleared on next Zion sync.

    rules:
      - "A package MUST NOT be listed in Zion if static security analysis found excessive permissions, suspicious network calls, direct fetch() calls without Bridge, eval() or new Function() usage, or hardcoded secrets patterns."
      - "Static security analysis runs client-side in the atlax publish CLI. Zion server runs an independent second scan as defense-in-depth."
      - "At installation, the installer verifies the manifest_signature against the publisher_key before any other step."
      - "At installation, the installer computes SHA-256 of the downloaded code bundle and compares it to manifest.payload.hash. A mismatch aborts installation."
      - "A new version of an agent does NOT automatically update installed instances — the user must explicitly approve the update and its permissions."
      - "Deprecating a package does NOT automatically disable or uninstall existing instances on user devices."
      - "On the next Zion sync for each user with the deprecated package installed, a persistent warning is shown: 'This agent has been deprecated by its publisher.' The agent continues running unless the user takes action."

  LLMProvider:
    description: >
      A configured connection to a language model provider (e.g. Anthropic,
      OpenAI, or a local runtime). Synapse uses provider configurations to
      select the optimal model for each task based on complexity, cost,
      latency, and required capabilities.
    lifecycle:
      - "configured"
      - "available"
      - "degraded"
      - "exhausted"
    thread_safety: "thread-safe"
    interface:
      complete:
        signature: "(request: LLMRequest) -> Promise<LLMResponse>"
        description: "Send a completion request to the provider's model"

    attributes:
      provider_name:
        type: string
        required: true
        constraints: "E.g. 'anthropic', 'openai', 'local'. Unique per router config."
      model_name:
        type: string
        required: true
        constraints: "E.g. 'claude-haiku', 'gpt-4o-mini', 'phi-3-mini'."
      cost_per_1k_tokens:
        type: decimal
        required: true
        constraints: "Cost in USD per 1,000 tokens. 0 for local models."
      latency_p50_ms:
        type: integer
        required: true
        constraints: "Median latency in milliseconds."
      capabilities:
        type: string
        required: true
        constraints: "Non-empty list from: reasoning, tools, vision, classification, extraction."
      api_key_env:
        type: string
        required: false
        constraints: "Environment variable name holding the API key. Not required for local models."
      runtime:
        type: string
        required: false
        constraints: "For local models: 'webllm' (web) or 'ollama' (mobile/desktop)."

    transitions:
      configured:
        - to: "available"
          when: "defineConfig() is called and the provider's API key is valid (verified on startup)"
          actor: "system"
      available:
        - to: "degraded"
          when: "3 consecutive API call failures occur within 60 seconds"
          actor: "system"
        - to: "exhausted"
          when: "The budget counter reaches 100% of the configured daily or monthly limit"
          actor: "system"
      degraded:
        - to: "available"
          when: "1 successful API call occurs (auto-recovery)"
          actor: "system"
      exhausted:
        - to: "available"
          when: "The daily counter resets at UTC 00:00, or the monthly counter resets on the first day of the UTC calendar month at 00:00"
          actor: "system"

    rules:
      - "An agent MUST NOT specify which model to use — it may only provide a complexity hint."
      - "Synapse classifies each request as trivial, simple, moderate, or complex before model selection."
      - "Trivial tasks (e.g. 'what time is it?') are answered directly without calling any LLM."
      - "A 'vision' capability requirement filters the candidate set to models that declare vision support."
      - "The fallback chain retries up to 2 times with exponential backoff before queuing the task."
      - "When the daily or monthly budget is exhausted, Synapse degrades to local-only models."
      - "A budget alert is emitted to the developer at 80% of the configured daily or monthly limit, delivered via the onBudgetAlert callback registered in defineRouter()."
      - "Synapse selects the least costly model that satisfies all required capabilities and strategy constraints."
      - "The daily LLM cost counter resets at UTC 00:00. The monthly counter resets on the first day of the UTC calendar month at 00:00."
      - "Budget exhaustion is enforced at routing time by Synapse. A degraded provider is already excluded from routing. If the daily budget is exhausted while a provider is degraded, no additional state transition occurs; budget enforcement at routing time handles both conditions independently."

  AuthSession:
    description: >
      An authenticated session for an end-user of an Atlax-powered application.
      Managed by the built-in Atlax auth module (separate from the Vault
      encryption passphrase). A valid session is required before any agent
      can execute on behalf of the user.
      On session expiry, behavior depends on the configured session.onExpiry
      mode: 'lock-vault' (default) zeros the Vault key from memory and
      transitions Vault to 'locked'; 'block-intents-only' keeps Vault unlocked
      but blocks new agent executions until re-authentication.
    lifecycle:
      - "unauthenticated"
      - "authenticated"
      - "expired"
      - "invalidated"
    thread_safety: "thread-safe"
    interface:
      authenticate:
        signature: "(credentials: Credentials) -> Promise<AuthSession>"
        description: "Validate credentials and create a session"
      refresh:
        signature: "(session: AuthSession) -> Promise<AuthSession>"
        description: "Extend a valid session before it expires"
      invalidate:
        signature: "(session: AuthSession) -> Promise<void>"
        description: "Explicitly terminate a session (logout)"

    attributes:
      session_id:
        type: string
        required: true
        constraints: "UUID v7. Generated at authentication."
      user_id:
        type: string
        required: true
        constraints: "Unique identifier for the end-user within the application."
      created_at:
        type: integer
        required: true
        constraints: "Unix timestamp in milliseconds."
      expires_at:
        type: integer
        required: true
        constraints: "Unix timestamp in milliseconds. Must be strictly greater than created_at."
      status:
        type: enum
        required: true
        values: ["unauthenticated", "authenticated", "expired", "invalidated"]
      on_expiry_mode:
        type: enum
        required: true
        values: ["lock-vault", "block-intents-only"]
        constraints: "Configurable by the developer via defineConfig() under session.onExpiry. Determines Vault behavior when session expires."
        default: "lock-vault"

    rules:
      - "No agent intent, hook, or scheduled action executes until a valid AuthSession exists for the user."
      - "An expired or invalidated session requires re-authentication before agents can resume."
      - "The AuthSession is separate from the Vault encryption key — unlocking Vault requires the user's passphrase independently."
      - "The auth module is provided by the Atlax framework and is not delegated to the host application."
      - "When session.onExpiry = 'lock-vault' (default): on session expiry, the Vault key is zeroed from memory and the Vault transitions to 'locked'. Agents cannot read or write memory until re-authentication and Vault re-unlock."
      - "When session.onExpiry = 'block-intents-only': on session expiry, the Vault stays unlocked but the invariant 'no intent fires without a valid session' blocks all new agent executions. The Vault re-locks only on explicit logout or device lock."

  AuditEntry:
    description: >
      A single immutable record in the append-only audit log managed by Bastion.
      Each entry documents one agent action, is signed by the agent's Ed25519
      key, and is hash-chained to the previous entry to form a tamper-evident
      log. The user can export and independently verify the chain.
      AuditEntry lifecycle states (created, chained, exported) are informational
      metadata only — they carry no behavioral contract within the framework.
    lifecycle:
      - "created"
      - "chained"
      - "exported"
    thread_safety: "thread-safe"
    interface:
      append:
        signature: "(entry: AuditEntry) -> Promise<void>"
        description: "Append a new signed, chained entry to the audit log"
      verify_chain:
        signature: "() -> Promise<VerificationResult>"
        description: "Verify all hash links and signatures in the audit log"
      export:
        signature: "() -> Promise<AuditEntry[]>"
        description: "Export the full audit log for independent verification"

    attributes:
      id:
        type: string
        required: true
        constraints: "UUID v7."
      previous_hash:
        type: string
        required: true
        constraints: "SHA-256 hex digest of the preceding entry. Empty string for the first entry."
      timestamp:
        type: integer
        required: true
        constraints: "Unix timestamp in milliseconds."
      agent:
        type: string
        required: true
        constraints: "Agent fingerprint (axag:xxxx:xxxx:xxxx:xxxx)."
      action:
        type: string
        required: true
        constraints: "Description of the action performed."
      params:
        type: string
        required: true
        constraints: "Parameters passed to the action. JSON-serializable."
      result:
        type: enum
        required: true
        values: ["success", "error", "denied", "cancelled"]
      llm_model:
        type: string
        required: false
        constraints: "Model identifier used if an LLM was invoked."
      tokens_used:
        type: integer
        required: false
        constraints: "Token count if an LLM was invoked. Non-negative."
      latency_ms:
        type: integer
        required: false
        constraints: "Latency in milliseconds. Non-negative."
      cost_usd:
        type: decimal
        required: false
        constraints: "Cost in USD if an LLM was invoked. Non-negative."
      entry_hash:
        type: string
        required: true
        constraints: "SHA-256 hex digest of the entire entry including previous_hash."
      signature:
        type: string
        required: true
        constraints: "Ed25519 signature of the entry by the acting agent."

    rules:
      - "Every agent action (including permission denials, cancellations, and errors) MUST produce an AuditEntry."
      - "The audit log is append-only — no entry can be modified or deleted after creation."
      - "The hash chain is verified by computing each entry's hash and comparing it to the next entry's previous_hash."
      - "A broken hash chain indicates tampering; the system reports the break point but does not halt."
      - "If an audit log append fails, retry 3 times with exponential backoff (1s, 2s, 4s). If all 3 retries fail: the agent is transitioned to DISABLED until audit logging is restored, and an error is surfaced to the developer via the observability channel."

# =============================================================================
# EXTENSION POINTS
# =============================================================================

extension_points:
  defineAgent:
    description: >
      Primary functional API for defining agents. Pure TypeScript, no experimental
      dependencies, full type inference via Zod. Recommended over the decorator
      approach for new projects. Produces the same internal AgentDefinition as the
      @Agent decorator. Accepts: name, version, description, permissions, triggers,
      intents, hooks, and guards as plain objects.
    pre_conditions:
      - "defineConfig() has been called before any defineAgent() call"
    post_conditions:
      - "An AgentDefinition is registered in the internal registry"
      - "All intents have their embeddings generated for the Intent Router"
    invariants:
      - "An agent defined with defineAgent() and one defined with @Agent must be indistinguishable at runtime"
      - "defineAgent() produces valid AgentDefinition types checked by Zod at registration time"

  Agent_decorator:
    description: "Registers a TypeScript class as an Atlax agent with a manifest. Syntactic sugar over defineAgent(). Both approaches produce identical runtime behavior."
    method_signature: "(config: AgentConfig) -> ClassDecorator"
    pre_conditions:
      - "The class is a valid TypeScript class"
      - "config.name is unique within the application's agent registry"
      - "config.permissions contains only valid Permission strings"
      - "config.version is a valid semantic version"
      - "defineConfig() has been called before any agent class decorated with @Agent is instantiated or registered (inherited from defineAgent() since @Agent is syntactic sugar)"
    post_conditions:
      - "The class is registered in the Cortex agent registry at startup"
      - "A manifest is generated and signed"
    invariants:
      - "An @Agent class without @Intent handlers is valid but will never be activated by intent routing"

  Intent_decorator:
    description: "Marks a method as an intent handler with natural-language patterns and parameter schema."
    method_signature: "(config: IntentConfig) -> MethodDecorator"
    pre_conditions:
      - "The method is on a class decorated with @Agent"
      - "config.patterns is a non-empty array of strings"
    post_conditions:
      - "Embeddings are pre-computed for all patterns at startup and registered in the intent index"
    invariants:
      - "The method signature must accept (ctx: AgentContext, params: Record<string, unknown>) as its first two parameters"

  Hook_decorator:
    description: "Marks a method as a handler for a named system or inter-agent event."
    method_signature: "(eventName: string) -> MethodDecorator"
    pre_conditions:
      - "The method is on a class decorated with @Agent"
      - "eventName is a non-empty string"
    post_conditions:
      - "The agent is subscribed to the named event on the AXP bus at startup"
    invariants:
      - "A hook handler must not block for more than 30 seconds"

  Guard_decorator:
    description: "Marks a method as a pre-action guard that runs before every action on the agent."
    method_signature: "() -> MethodDecorator"
    pre_conditions:
      - "The method is on a class decorated with @Agent"
    post_conditions:
      - "The method is invoked before every action execution on the agent"
    invariants:
      - "If the guard throws, the action is blocked and an error is returned to the caller"
      - "The guard must not have side effects that modify persistent state"

  Tool_decorator:
    description: "Declares an MCP tool binding available to the agent via ctx.tools."
    method_signature: "(toolConfig: ToolConfig) -> MethodDecorator"
    pre_conditions:
      - "The agent declares the corresponding tools.<name> permission in its manifest"
      - "The MCP server is configured in atlax.config.ts"
    post_conditions:
      - "The tool is accessible via ctx.tools.invoke(name, method, params) within the agent"
    invariants:
      - "Tool execution is sandboxed through the Bridge — the agent never calls the MCP server directly"

  defineConfig:
    description: >
      Defines the global application configuration for an Atlax-powered OS.
      Includes session expiry behavior via session.onExpiry ('lock-vault' | 'block-intents-only').
    method_signature: "(config: AtlaxConfig) -> AtlaxConfig"
    pre_conditions:
      - "Called exactly once in atlax.config.ts"
    post_conditions:
      - "All subsystems (Cortex, Vault, Synapse, Neo, Bastion, Bridge) are initialized with the provided config"
      - "session.onExpiry behavior is set for the AuthSession lifecycle"
    invariants:
      - "If memory.encryption.algorithm is not 'aes-256-gcm', the framework throws at startup"
      - "If memory.encryption.keyDerivation is not 'argon2id', the framework throws at startup"
      - "If session.onExpiry is not one of 'lock-vault' or 'block-intents-only', the framework throws at startup"

  defineRouter:
    description: >
      Configures the Synapse LLM router: providers, routing strategies, fallback
      chain, budget limits, and the onBudgetAlert callback.
    method_signature: "(config: RouterConfig) -> Router"
    pre_conditions:
      - "At least one provider is configured with at least one model"
    post_conditions:
      - "Synapse is initialized with the provided providers and strategies"
      - "If onBudgetAlert is provided, it is registered as the callback for budget threshold events"
    invariants:
      - "onBudgetAlert is called with (percentage: number, provider: string) when spend crosses 80% of any budget limit"
      - "onBudgetAlert is delivered as an in-process event — it does not require any agent or permission"
      - "onBudgetAlert is a one-time edge trigger per budget period. It fires once when spend crosses from below 80% to at-or-above 80% within a budget period. It does not fire again until the budget period resets and spend crosses the threshold again in the new period."

  defineDashboard:
    description: >
      Configures the @atlax/dashboard optional package (separate from @atlax/neo).
      Accepts widget list, prioritization rules, and theme configuration.
      This extension point is only available when @atlax/dashboard is installed.
    method_signature: "(config: DashboardConfig) -> Dashboard"
    pre_conditions:
      - "The @atlax/dashboard package is installed as a dependency"
      - "Called in dashboard.ts and referenced in atlax.config.ts"
    post_conditions:
      - "The dashboard layout engine is initialized with the provided configuration"
      - "Pinned widgets are registered and always visible"
      - "Prioritization rules are applied in order when micro-apps are inserted"
    invariants:
      - "Dashboard is a separate optional package — @atlax/neo does not include it by default"
      - "Micro-apps rendered by @atlax/neo are available to the dashboard; the dashboard is not required for rendering to function"

  registerComponent:
    description: "Registers a custom React/React Native component that AXUI schemas can reference by type name."
    method_signature: "(typeName: string, config: ComponentConfig) -> void"
    pre_conditions:
      - "typeName is a non-empty string not already registered as a built-in AXUI node type"
      - "config.web and/or config.mobile provide lazy-loaded component imports"
    post_conditions:
      - "Neo renderer recognizes the custom type name and renders the registered component"
    invariants:
      - "Custom components cannot access the DOM directly — they receive only the props derived from the AXUI schema node"

  ThemeProvider:
    description: "Provides semantic color tokens and typography scales to the Neo renderer."
    method_signature: "(theme: ThemeConfig) -> ThemeProvider"
    pre_conditions:
      - "Configured in atlax.config.ts under the 'theme' key"
    post_conditions:
      - "All AXUI semantic color tokens resolve to the theme's concrete values at render time"
    invariants:
      - "Semantic tokens (e.g. 'primary', 'surface', 'danger') must always resolve — a missing token is a configuration error"

  Plugin_registry:
    description: "Future extension point (Phase 4) for plugins that extend Cortex, Neo, or Vault."
    method_signature: "(plugin: AtlaxPlugin) -> void"
    pre_conditions:
      - "Plugin declares which subsystem it extends"
    post_conditions:
      - "Plugin hooks are registered in the target subsystem"
    invariants:
      - "A plugin cannot override Bastion security checks"

composition_rules:
  - "Multiple @Guard decorators on the same agent execute in declaration order (top to bottom)."
  - "Multiple @Intent handlers within the same agent are each independently registered — no ordering between them."
  - "Multiple @Hook handlers for the same event name on the same agent all fire (no exclusivity)."
  - "LLM routing strategies are evaluated in the order declared in the 'strategies' config object."
  - "Dashboard prioritization rules are evaluated in order; the first matching rule wins."
  - "Custom AXUI components added via registerComponent do not replace built-in node types — type names must not collide."
  - "At most one defineConfig() call is valid per application. A second call throws at startup."
  - "@atlax/dashboard is a separate optional package from @atlax/neo. @atlax/neo can be used without @atlax/dashboard."

# =============================================================================
# LAYER 2: BEHAVIORS
# =============================================================================

behaviors:
  user_authentication:
    actor: end_user
    description: >
      An end-user authenticates to the Atlax-powered application using the
      built-in auth module, establishing a valid AuthSession before any agents
      can act on their behalf.
    pre_conditions:
      - "The application has an auth module configured"
      - "No valid AuthSession exists for the user (or the previous session has expired)"
    result:
      - "A new AuthSession exists with status 'authenticated'"
      - "The session has a valid expires_at timestamp in the future"
      - "The user's Vault remains locked until separately unlocked with the user passphrase"
    side_effects:
      - "Session creation is recorded in the audit log"
    on_failure:
      - "No AuthSession is created"
      - "The user remains unauthenticated"
      - "Agents remain inactive until a successful authentication"

  vault_unlock:
    actor: end_user
    description: >
      The user provides their passphrase, which derives the AES-256-GCM key via
      Argon2id and unlocks the Vault, making all memory tiers accessible to
      agents in the current session. On session expiry, Vault behavior depends
      on the configured session.onExpiry mode.
    pre_conditions:
      - "A valid AuthSession exists"
      - "The Vault is in 'locked' state"
      - "The user provides their passphrase"
    result:
      - "The Vault transitions to 'unlocked' state"
      - "All memory tiers become accessible to agents in this session"
      - "The derived encryption key is held in memory only — never written to disk"
    side_effects:
      - "Vault unlock event is recorded in the audit log"
      - "If session.onExpiry = 'lock-vault': when the session later expires, the Vault key is zeroed and Vault transitions back to 'locked'"
      - "If session.onExpiry = 'block-intents-only': when the session later expires, Vault remains unlocked but new agent executions are blocked until re-authentication"
    on_failure:
      - "The Vault remains locked"
      - "No agent can read or write memory until a successful unlock"
      - "An error is reported to the user (wrong passphrase)"

  agent_registration:
    actor: developer
    description: >
      A developer defines an agent class with the @Agent decorator and
      associated @Intent, @Hook, and @Guard handlers. At application startup,
      Cortex registers the agent in its registry, pre-computes intent embeddings,
      and sets the agent to INSTALLED state pending user permission approval.
    pre_conditions:
      - "The agent class is decorated with @Agent and has a unique name"
      - "All declared permissions are valid Permission strings"
      - "The version is a valid semantic version string"
      - "The agent name is not already registered in the Cortex registry"
    result:
      - "The agent is registered in the Cortex AgentRegistry with state INSTALLED"
      - "Intent embeddings are pre-computed for all @Intent patterns"
      - "A manifest is generated with the declared name, version, description, permissions, and capabilities"
      - "An Ed25519 key pair is generated for this agent instance"
      - "All permissions transition from 'declared' to 'pending_approval'"
    side_effects:
      - "Hook subscriptions are registered on the AXP bus"
      - "Cron triggers are registered in the scheduler if declared"
    on_failure:
      - "The agent is not registered"
      - "If name collision: an error is thrown at startup identifying the duplicate"
      - "If invalid permissions: an error is thrown at startup listing the invalid entries"

  permission_approval:
    actor: end_user
    description: >
      After an agent is installed (from local registration or marketplace), the
      user reviews the permission list and approves or rejects it. Approval
      transitions the agent to IDLE. Rejection atomically aborts installation —
      no agent record, no permissions, nothing persisted.
    pre_conditions:
      - "The agent is in INSTALLED state"
      - "The permission dialog has been presented to the user"
    result:
      - "If approved: all declared permissions transition to 'granted'; agent transitions to IDLE"
      - "If rejected: installation is aborted atomically — no agent record is created, no permissions are stored, and no state is persisted. As if installation never happened."
    side_effects:
      - "Permission grant is recorded in the audit log on approval"
    on_failure:
      - "If the dialog is dismissed without a decision, it is treated as rejection — clean abort with no state persisted"

  permission_check:
    actor: system
    description: >
      Bastion verifies that an agent holds the required permission before
      allowing any operation to proceed. Runs on every agent action.
    trigger: "An agent attempts any operation (memory read/write, tool call, UI render, AXP send, etc.)"
    pre_conditions:
      - "An agent action is requested"
      - "The agent is in EXECUTING or WAITING state"
    result:
      - "If permission is held: the operation is allowed to proceed"
      - "If permission is not held: a PermissionDenied error is thrown and the operation is blocked"
    side_effects:
      - "An AuditEntry is created for every permission check with result 'success' or 'denied'"
    on_failure:
      - "The operation is blocked"
      - "A PermissionDenied error is returned to the agent"
      - "The audit log records the denial with the agent fingerprint, action, and required permission"

  intent_routing:
    actor: system
    description: >
      Cortex receives a user's natural-language input and routes it to the
      best-matching agent intent using embedding-based similarity.
      If the best-matching agent is WAITING, Cortex routes to the second-best
      or holds for up to 30 seconds.
    trigger: "A user submits text or voice input via the dashboard, chat, or voice channel"
    pre_conditions:
      - "A valid AuthSession exists"
      - "The Vault is unlocked"
      - "At least one agent is in IDLE state"
    result:
      - "The highest-scoring intent above the match threshold is selected"
      - "Parameters are extracted from the input according to the intent's param schema"
      - "The owning agent transitions from IDLE to ACTIVATED"
    side_effects:
      - "If a required parameter cannot be extracted, the user is prompted for clarification before routing"
      - "Intent classification is recorded in the trace"
      - "If the best-matching agent is WAITING: routing falls back to second-best agent, or holds up to 30 seconds"
    on_failure:
      - "If no intent scores above the threshold: the user receives a 'no matching intent' response"
      - "If best-matching agent is WAITING and no second-best exists and 30 seconds elapse: the user receives 'Agent is busy, please try again'"
      - "The agent remains in IDLE state on routing failure"
      - "A trace entry records the failed routing attempt"

  agent_execution:
    actor: system
    description: >
      Cortex transitions an ACTIVATED agent to EXECUTING, loads its context and
      memory namespace, and invokes the matched intent handler (or hook/schedule).
      The agent runs in a sandboxed context. In development mode (atlax dev), local
      agents run in Web Workers — no .wasm compilation required, enabling fast hot
      reload. In Phase 2+, atlax build compiles TypeScript agent code to agent.wasm
      via Javy (which embeds QuickJS as the JS interpreter inside the WASM module).
      On the web platform (browser), the browser executes agent.wasm using the native
      WebAssembly API — providing linear memory isolation without requiring Wasmtime
      in the browser. On mobile and desktop (native), the Rust core uses embedded
      Wasmtime to execute agent.wasm — providing CPU limits, instruction-level
      isolation, and fine-grained host API control.
      A circuit breaker disables the agent after 3 consecutive failures within 5 minutes.
    trigger: "An agent transitions to ACTIVATED state"
    pre_conditions:
      - "The agent is in ACTIVATED state"
      - "A valid AuthSession exists"
      - "The Vault is unlocked"
      - "The agent's sandbox is available: Web Worker (if identity.signedBy is absent and running in dev mode), or WASM sandbox (browser WebAssembly API if identity.signedBy is present on web; Wasmtime if identity.signedBy is present on native)"
    result:
      - "The intent handler is invoked with the AgentContext and extracted parameters"
      - "Any AXUI schema returned by the handler is passed to Neo for rendering"
      - "On success: the agent transitions to IDLE and consecutive_failure_count resets to 0"
    side_effects:
      - "An AuditEntry is created recording the action, params, result, model used, tokens consumed, latency, and cost"
      - "OpenTelemetry trace spans are emitted for each subsystem step"
      - "reputation_update behavior is triggered after execution completes"
    on_failure:
      - "On first or second consecutive failure within the window: consecutive_failure_count is incremented; the agent transitions to IDLE"
      - "On third consecutive failure within failure_window_seconds: consecutive_failure_count reaches 3; the agent transitions to DISABLED (circuit breaker)"
      - "If execution exceeds 30 seconds: the sandbox kills the execution (Web Worker terminated in dev mode; browser WebAssembly API terminates the WASM instance on web in Phase 2+; Wasmtime host function terminates the WASM instance on native in Phase 2+); this counts as a failure for the circuit breaker"
      - "An AuditEntry is created with result 'error' for every failure"
      - "The user receives an error notification"

  memory_read:
    actor: system
    description: >
      An agent reads data from its own memory namespace (working, episodic,
      semantic, or preferences tier) during execution.
    trigger: "Agent calls ctx.memory.working.get(), ctx.memory.query(), ctx.memory.semanticSearch(), or ctx.memory.preferences.get()"
    pre_conditions:
      - "The agent is in EXECUTING or WAITING state"
      - "The agent holds the required memory.read permission for the namespace being accessed"
      - "The Vault is unlocked (or in 'syncing' sub-state — reads proceed normally during sync)"
    result:
      - "The requested data is returned to the agent, decrypted in memory"
    side_effects:
      - "An AuditEntry is created for the read operation"
      - "vault_operations_total metric is incremented"
    on_failure:
      - "If permission missing: PermissionDenied is thrown; AuditEntry created with result 'denied'"
      - "If Vault is locked: an error is thrown; the agent waits for unlock before retrying"
      - "If the collection or key does not exist: an empty result is returned (not an error)"

  memory_write:
    actor: system
    description: >
      An agent writes data to its own memory namespace during execution.
      Writes proceed normally even while a cloud sync cycle is in progress
      (syncing is a sub-state of unlocked). The CRDT strategy handles
      conflicts on the next sync cycle.
    trigger: "Agent calls ctx.memory.store(), ctx.memory.update(), ctx.memory.delete(), ctx.memory.semanticStore(), ctx.memory.working.set(), or ctx.memory.preferences.set()"
    pre_conditions:
      - "The agent is in EXECUTING or WAITING state"
      - "The agent holds the required memory.write permission for its namespace"
      - "The Vault is unlocked or syncing (both allow writes)"
      - "For episodic writes: the collection size is within the 500 MB limit"
      - "For semantic writes: the vector count is below 100,000"
    result:
      - "Data is encrypted and persisted to the appropriate tier"
      - "For episodic store: a document ID is returned"
      - "For semantic store: the embedding is computed locally and the vector is stored"
      - "If Vault is in 'syncing' state: the write is applied locally immediately; the CRDT strategy will resolve any conflicts with remote data on the next sync cycle"
    side_effects:
      - "An AuditEntry is created for the write operation"
      - "vault_storage_bytes metric is updated"
    on_failure:
      - "If permission missing: PermissionDenied is thrown; operation is not written"
      - "If storage limit exceeded: an error is returned; the write does not occur"
      - "If encryption fails: an error is thrown; no partial write is persisted"

  axp_send:
    actor: system
    description: >
      An agent sends a point-to-point AXP REQUEST message to another agent
      through the Cortex bus, awaiting a RESPONSE. If the target agent is
      EXECUTING or WAITING, Cortex queues the message (max 50 per agent) until
      the target returns to IDLE.
    trigger: "Agent calls ctx.axp.send() or awaits a REQUEST-RESPONSE pair"
    pre_conditions:
      - "The sending agent is in EXECUTING state"
      - "The sending agent holds axp.send:<targetAgent> permission"
      - "The target agent is in IDLE, EXECUTING, or WAITING state (DISABLED agents are rejected immediately)"
      - "The message is signed with the sender's Ed25519 key"
    result:
      - "Cortex verifies the signature and the sender's permission"
      - "Cortex records the message in the audit log"
      - "If target is IDLE: message is forwarded immediately to the target agent"
      - "If target is EXECUTING or WAITING: message is queued externally by Cortex until the target returns to IDLE, then delivered to trigger a fresh activation"
      - "The target agent processes the request and returns a RESPONSE"
      - "The RESPONSE is delivered to the sender"
    side_effects:
      - "Two AuditEntries created: one for the REQUEST and one for the RESPONSE"
      - "If the queue for the target agent is at max capacity (50) when a new message arrives, the oldest queued message is dropped with a warning in the audit log"
    on_failure:
      - "If signature invalid: message is dropped; AuditEntry created with result 'denied'"
      - "If sender lacks permission: PermissionDenied; AuditEntry created with result 'denied'"
      - "If target agent is DISABLED: axp.error returned immediately with reason AGENT_UNAVAILABLE"
      - "If TTL expires before response (including while queued): axp.error returned with reason TIMEOUT"

  axp_broadcast:
    actor: system
    description: >
      An agent emits a broadcast EVENT on the AXP bus. All subscribed agents
      (via @Hook) receive it asynchronously.
    trigger: "Agent calls ctx.axp.emit()"
    pre_conditions:
      - "The sending agent is in EXECUTING state"
      - "The sending agent holds axp.broadcast permission"
      - "The message is signed with the sender's Ed25519 key"
    result:
      - "Cortex verifies the signature and permission"
      - "The event is delivered to all agents subscribed to the event type"
    side_effects:
      - "An AuditEntry is created for the broadcast event"
    on_failure:
      - "If signature invalid or permission missing: the event is not broadcast; AuditEntry with result 'denied'"

  axp_delegate:
    actor: system
    description: >
      An agent delegates a complete sub-task to another agent via DELEGATE message.
      Multiple delegations can be executed concurrently via Promise.all.
    trigger: "Agent calls ctx.axp.delegate()"
    pre_conditions:
      - "The sending agent is in EXECUTING state"
      - "The sending agent holds axp.send:<targetAgent> permission"
      - "The target agent is in IDLE state and available"
    result:
      - "The target agent executes the delegated sub-task"
      - "A DELEGATE_RESULT message is returned to the originating agent"
      - "The delegating agent can continue execution with the result"
    side_effects:
      - "AuditEntries are created for both the DELEGATE and DELEGATE_RESULT messages"
      - "The target agent transitions IDLE -> ACTIVATED -> EXECUTING -> IDLE for the duration"
    on_failure:
      - "If target agent is unavailable: axp.error with AGENT_UNAVAILABLE returned"
      - "If delegation timeout: axp.error with TIMEOUT returned; the delegating agent decides how to handle it"
      - "Partial results from concurrent delegations are available; failed delegations return errors individually"

  llm_routing:
    actor: system
    description: >
      Synapse selects the optimal LLM for a given agent request based on task
      complexity classification, required capabilities, cost constraints, and
      latency targets.
    trigger: "An agent calls ctx.llm.complete()"
    pre_conditions:
      - "At least one LLM provider is configured and in 'available' or 'degraded' state"
      - "The request complexity has been classified"
      - "The current daily and monthly budget is not exhausted"
    result:
      - "The optimal model is selected from the matching strategy's preference list"
      - "The request is sent to the selected provider"
      - "The response is returned to the agent"
      - "Token count, latency, and cost are recorded"
    side_effects:
      - "llm_tokens_total, llm_cost_total, and llm_latency metrics are updated"
      - "An AuditEntry records the model used, tokens, latency, and cost"
    on_failure:
      - "If the preferred model fails: retry up to 2 times with exponential backoff on the next model in the strategy"
      - "If all models in the strategy fail: the task is queued for later retry (onAllFail: 'queue')"
      - "If budget is exhausted mid-request: the request is degraded to a local model if available; otherwise queued"
      - "An error is returned to the agent with the failure reason"

  budget_management:
    actor: system
    description: >
      Synapse tracks accumulated LLM spend against configured daily and monthly
      budgets. Alerts at 80% via the onBudgetAlert callback. Degrades to
      local-only models at 100%. Daily counter resets at UTC 00:00; monthly
      counter resets on the first day of the UTC calendar month at 00:00.
    trigger: "Every LLM completion request updates the accumulated cost counters"
    pre_conditions:
      - "A budget configuration exists (daily and/or monthly limits in USD)"
    result:
      - "If spend is below alert threshold (80%): no action"
      - "If spend crosses from below 80% to at-or-above 80% (edge trigger, once per budget period): onBudgetAlert(percentage, provider) callback is invoked"
      - "If spend reaches 100%: Synapse degrades to local-only models for all subsequent requests"
    side_effects:
      - "llm_cost_total metric is updated after every request"
      - "Daily cost counter resets to 0 at UTC 00:00"
      - "Monthly cost counter resets to 0 on the first day of each UTC calendar month at 00:00"
    on_failure:
      - "If cost tracking fails: the request is still executed; a cost_tracking_error event is emitted"

  axui_render:
    actor: system
    description: >
      The Neo renderer validates an AXUI schema emitted by an agent, resolves
      theme tokens, maps nodes to React/React Native components, binds data,
      and wires action handlers before inserting the micro-app into the dashboard.
    trigger: "An agent's intent handler returns an AXUI schema (via ctx.ui.render())"
    pre_conditions:
      - "The AXUI schema version is 'axui/1.0'"
      - "The root node is a valid AXUINode type"
      - "The agent holds the ui.render permission"
      - "For fullscreen surface: agent holds ui.fullscreen permission"
      - "For notification surface: agent holds ui.notify permission"
    result:
      - "The schema is validated against the AXUI 1.0 JSON Schema"
      - "Semantic color tokens are resolved to theme values"
      - "A React or React Native component tree is produced"
      - "The micro-app is inserted into the dashboard according to priority and layout rules"
      - "If ttl is set: a timer is started; on expiry the micro-app is removed and an audit entry is created with action 'micro_app_dismissed' and reason 'ttl_expired'"
      - "If refresh is set: a recurring timer re-invokes the originating intent with the same parameters"
    side_effects:
      - "neo_render_duration metric is updated"
      - "If surface is 'notification': a push notification is triggered"
    on_failure:
      - "If schema validation fails: the micro-app is not rendered; an error is logged with the validation issues"
      - "If a required permission is missing: PermissionDenied; the render is blocked"
      - "If a custom component type is unknown: the node is rendered as an error placeholder"

  agent_install_from_marketplace:
    actor: end_user
    description: >
      An end-user installs an agent from the Zion marketplace. Includes
      signature verification, code hash verification, permission review,
      and registration in Cortex. If the user rejects permissions, the
      installation is aborted atomically — no state is persisted.
    pre_conditions:
      - "A valid AuthSession exists"
      - "The agent package is available in the Zion registry"
    result:
      - "The package manifest signature is verified against the publisher's public key"
      - "The SHA-256 hash of the downloaded code bundle matches manifest.payload.hash"
      - "The user reviews and approves all declared permissions"
      - "A unique Ed25519 key pair is generated for this agent instance"
      - "The agent is registered in Cortex with state IDLE"
      - "All permissions are recorded as 'granted'"
      - "identity.signedBy is set to the publisher's Ed25519 fingerprint (derived from AgentPackage.publisher_key), enabling Cortex to select the WASM sandbox at execution time"
    side_effects:
      - "Installation and permission approval events are recorded in the audit log"
      - "The agent's reputation metrics are initialized"
    on_failure:
      - "If signature verification fails: installation is aborted with SecurityError('Invalid publisher signature'). No agent state is persisted."
      - "If code hash mismatches: installation is aborted with SecurityError('Code hash mismatch'). No agent state is persisted."
      - "If user rejects the permission dialog: installation is aborted atomically — no agent record is created, no permissions are stored, nothing is persisted. As if installation never happened."
      - "All failures are all-or-nothing — no partial installation state is ever left in Cortex"

  agent_publish:
    actor: publisher
    description: >
      A developer publishes a packaged agent to the Zion marketplace using the
      CLI. Static analysis runs client-side first; Zion runs an independent
      second scan. The package is signed, analyzed, and uploaded.
    pre_conditions:
      - "The developer has a valid Zion publisher account with an Ed25519 key pair"
      - "The agent passes local validation (valid manifest, valid permissions)"
      - "atlax publish is invoked from the project directory"
    result:
      - "SHA-256 hash of the code bundle is computed and embedded in the manifest"
      - "The manifest is signed with the publisher's Ed25519 key"
      - "Client-side static security analysis runs (checks: undeclared permissions referenced in code, direct fetch() without Bridge, eval/new Function usage, hardcoded secrets patterns)"
      - "If client-side analysis passes: the package is uploaded to Zion"
      - "Zion runs an independent second static scan as defense-in-depth"
      - "If Zion scan passes: the package is listed as 'available'"
    side_effects:
      - "The package version is immutable once published — republishing requires a version bump"
    on_failure:
      - "If client-side static analysis fails: the package is not uploaded; the developer receives a detailed report"
      - "If signing fails: upload is aborted"
      - "If the version already exists in the registry: upload is rejected"
      - "If Zion server-side scan fails: the package is uploaded but not listed; the developer is notified"

  agent_deprecate:
    actor: publisher
    description: >
      A publisher or Zion admin marks a published package as deprecated.
      Existing installed instances continue running. A persistent warning is
      shown to users on the next Zion sync.
    pre_conditions:
      - "The package is in 'available' state in the Zion registry"
      - "The actor is the package's publisher or a Zion admin"
    result:
      - "The package transitions to 'deprecated' state in the Zion registry"
      - "The package is still downloadable but clearly marked as deprecated"
    side_effects:
      - "On the next Zion sync for each user with this package installed, a persistent warning is shown: 'This agent has been deprecated by its publisher.'"
      - "No automatic disable or uninstall of existing instances occurs"
    on_failure:
      - "If the actor is not authorized (not publisher or Zion admin): the deprecation is rejected"
      - "If the package is not in 'available' state: the deprecation is rejected"

  audit_log_entry:
    actor: system
    description: >
      Bastion appends a signed, hash-chained entry to the immutable audit log
      after every agent action. Retries 3 times on failure with exponential
      backoff. On total failure, the agent is suspended.
    trigger: "Any agent action completes, fails, or is denied"
    pre_conditions:
      - "The acting agent's fingerprint is known"
      - "The previous audit entry's hash is available for chaining"
    result:
      - "A new AuditEntry is appended with id, previousHash, timestamp, agent, action, params, result, optional LLM metadata, entry_hash, and signature"
      - "The entry is chained to the previous entry via previousHash"
    side_effects:
      - "vault_operations_total metric is incremented"
    on_failure:
      - "Retry policy: 3 retries with exponential backoff (1s, 2s, 4s)"
      - "If all 3 retries fail: the agent is transitioned to DISABLED until audit logging is restored"
      - "An error is surfaced to the developer via the observability (OpenTelemetry) channel"
      - "The agent action result is NOT rolled back — the action stands; the gap in the chain is detectable on export/verification"

  permission_revocation:
    actor: end_user
    description: >
      A user revokes a previously granted permission from an installed agent.
      Whether the agent is disabled depends on whether the revoked permission
      is required by any of the agent's declared @Intent handlers.
    pre_conditions:
      - "A valid AuthSession exists"
      - "The permission is currently in 'granted' state for the specified agent"
    result:
      - "The permission status changes to 'revoked'"
      - "If the agent is EXECUTING or WAITING: the agent always transitions to DISABLED"
      - "If the agent is IDLE and the revoked permission is required by at least one @Intent handler: the agent transitions to DISABLED"
      - "If the agent is IDLE and the revoked permission is NOT required by any @Intent handler: the agent stays IDLE and simply loses that capability"
    side_effects:
      - "Revocation is recorded in the audit log"
      - "If the agent transitions to DISABLED: any pending AXP messages from the agent are cancelled"
    on_failure:
      - "If the agent is not found: an error is returned to the user"
      - "The permission state is not changed"

  reputation_update:
    actor: system
    description: >
      After each agent execution completes, Cortex recalculates the agent's
      reputation score and enforces thresholds. Score persists when the agent
      is disabled — it is NOT reset on re-enable.
    trigger: "An agent execution completes (success, error, or cancelled)"
    pre_conditions:
      - "The agent has a reputation score record"
    result:
      - "intentSuccessRate, humanInterventionRate, errorRate, avgResponseTime, and uptime metrics are updated"
      - "The combined score (0.0–1.0) is recalculated"
      - "If score drops below 0.2: the agent is automatically disabled (DISABLED state)"
      - "The score retains its last calculated value when the agent is disabled — it is not reset on re-enable"
    side_effects:
      - "If score crosses 0.5 boundary downward: a system reputation warning is emitted by Cortex using the AXUI notification surface (bypasses agent execution pipeline, requires no agent permission)"
    on_failure:
      - "If score calculation fails: the previous score is retained; a metric error is logged"

  cloud_sync:
    actor: end_user
    description: >
      When a user opts in to cloud sync, the preferences tier of their Vault is
      encrypted on-device and uploaded to the sync provider. Local writes proceed
      normally during sync. Conflicts are resolved via CRDT (default) or
      last-write-wins.
    pre_conditions:
      - "A valid AuthSession exists"
      - "The user has explicitly enabled sync (sync.enabled = true)"
      - "A sync provider (atlax-cloud or self-hosted) is reachable"
      - "The Vault is unlocked or syncing"
    result:
      - "The Vault transitions to 'syncing' sub-state during the sync cycle"
      - "The preferences tier data is encrypted on-device with the user's key"
      - "The encrypted blob is uploaded to the sync provider"
      - "On the receiving device, the blob is downloaded and decrypted locally"
      - "Conflicts are resolved according to the configured strategy (CRDT default)"
      - "The Vault returns to 'unlocked' state when the sync cycle completes"
    side_effects:
      - "Sync events are recorded in the audit log"
      - "Local writes during the sync cycle are applied immediately; CRDT resolves conflicts on the next cycle"
    on_failure:
      - "If the sync provider is unreachable: the local data remains unchanged; sync retries on reconnect; Vault returns to 'unlocked'"
      - "If conflict resolution fails: the conflict is presented to the user for manual resolution"
      - "The sync server never receives plaintext data — if encryption fails, upload is aborted; Vault returns to 'unlocked'"

  dashboard_prioritization:
    actor: system
    description: >
      The @atlax/dashboard layout engine positions micro-apps in the adaptive
      grid based on priority, agent, time-of-day rules, and user interaction
      frequency. Requires @atlax/dashboard to be installed and defineDashboard()
      to have been called.
    trigger: "A new micro-app is inserted into the dashboard or the dashboard is refreshed"
    pre_conditions:
      - "The @atlax/dashboard package is installed and defineDashboard() was called"
      - "The micro-app has a valid surface type and priority"
    result:
      - "Urgent micro-apps are positioned at the top with a pulse animation"
      - "Prioritization rules are evaluated in order; the first matching rule determines position and boost"
      - "Pinned widgets remain visible at their configured positions"
    side_effects:
      - "neo_user_interaction metric is updated when a user interacts with the positioned micro-app"
    on_failure:
      - "If no prioritization rule matches: the micro-app is appended at the default position"
      - "If @atlax/dashboard is not installed: micro-apps are rendered by @atlax/neo without dashboard positioning"

  mcp_tool_invocation:
    actor: system
    description: >
      An agent invokes an external MCP tool via the Bridge. The Bridge sandboxes
      the call and validates the tool response for prompt injection via
      @atlax/prompt-guard.
    trigger: "Agent calls ctx.tools.invoke(toolName, method, params)"
    pre_conditions:
      - "The agent holds the tools.<toolName> permission"
      - "The MCP server for the tool is configured and reachable"
      - "The agent is in EXECUTING state"
    result:
      - "The Bridge forwards the call to the MCP server"
      - "The response is validated by @atlax/prompt-guard before being returned to the agent"
      - "The validated result is returned to the agent"
    side_effects:
      - "An AuditEntry records the tool name, method, params, and result"
    on_failure:
      - "If the MCP server is unreachable: an error is returned to the agent"
      - "If @atlax/prompt-guard detects injection in the tool response: the response is blocked and the agent receives a sanitized error"
      - "If the agent lacks tools.<toolName> permission: PermissionDenied is thrown before the call is made"

  voice_input:
    actor: end_user
    description: >
      The user activates voice input via the dashboard header. The spoken input
      is transcribed and routed through the standard intent routing pipeline.
      microphone.read is a platform-level permission held by the host application
      — Bastion does NOT check it per-agent.
    pre_conditions:
      - "A valid AuthSession exists"
      - "The host application holds the platform-level microphone.read permission (granted by the OS to the app, not checked per-agent by Bastion)"
      - "The user activates the voice input button"
    result:
      - "Speech is transcribed to text"
      - "The transcribed text is routed through the intent_routing behavior"
    side_effects:
      - "Voice input event is recorded in the trace"
    on_failure:
      - "If transcription fails: the user is shown an error and prompted to try again or use text input"

# =============================================================================
# LAYER 3: INVARIANTS AND TESTS
# =============================================================================

invariants:
  safety:
    - "An agent in INSTALLED state MUST NOT execute any intent, hook, or scheduled action."
    - "An agent in DISABLED state MUST NOT execute any intent, hook, or scheduled action."
    - "An agent MUST NOT read or write another agent's memory namespace without the exact cross-namespace permission granted."
    - "An agent MUST NOT communicate with another agent except through the Cortex AXP bus."
    - "Bastion MUST verify an agent's Ed25519 signature on every AXP message before forwarding — no unsigned messages are ever delivered."
    - "The immutable audit log MUST NOT allow modification or deletion of any existing entry."
    - "An AXUI schema MUST NOT contain executable code — only declarative JSON data."
    - "The Vault encryption key MUST NOT be written to persistent storage — it exists only in memory."
    - "memory.read:* permission MUST NOT be granted to any user-defined agent."
    - "A Zion package MUST NOT be installed if the code hash does not match the manifest's declared hash."
    - "A Zion package MUST NOT be installed if the publisher's signature verification fails."
    - "No agent execution MUST proceed beyond 30 seconds — the sandbox kills it unconditionally."
    - "An agent with reputation score below 0.2 MUST be automatically disabled by the system."
    - "An agent with consecutive_failure_count >= 3 within failure_window_seconds MUST be automatically disabled."
    - "Cloud sync data MUST be encrypted on-device before upload — the sync server MUST never receive plaintext."
    - "No agent intent, hook, or schedule fires without a valid AuthSession existing."
    - "microphone.read is a platform-level permission held by the host app — Bastion MUST NOT check it per-agent for voice input."
    - "System reputation warnings MUST be emitted by Cortex using the AXUI notification surface, bypassing the agent execution pipeline — no agent permission is required."
    - "In Phase 2+, agents installed from the Zion marketplace (those with a populated identity.signedBy from a third-party publisher) MUST run in the WASM sandbox: browser WebAssembly API on web, Wasmtime on native. Cortex derives this from identity.signedBy at execution time — no additional attribute is required."

  integrity:
    - "Every audit log entry's previousHash must equal the SHA-256 hash of the immediately preceding entry, except for the first entry in the log (the genesis entry), whose previousHash is the empty string by definition."
    - "Every audit log entry's entry_hash must equal the SHA-256 hash of the full entry content including previousHash."
    - "Every audit log entry's signature must be a valid Ed25519 signature by the acting agent's key."
    - "Every installed agent's code bundle SHA-256 must match the hash stored in its manifest."
    - "Every AXP message's signature must be a valid Ed25519 signature by the sender agent's key."
    - "Every agent's declared permissions must be a subset of the allowed Permission string patterns."
    - "An agent's reputation_score at re-enable must equal its score at the time of disable — no reset."

  states:
    - "An agent's state is always exactly one of: INSTALLED, IDLE, ACTIVATED, EXECUTING, WAITING, DISABLED."
    - "An agent can only transition to EXECUTING from ACTIVATED — never from IDLE, WAITING, or DISABLED directly."
    - "An agent in EXECUTING state has exactly one active sandbox running (Web Worker in dev mode for agents without identity.signedBy; WASM sandbox (browser WebAssembly API on web, Wasmtime on native) in production builds for agents without identity.signedBy; WASM sandbox (browser WebAssembly API on web, Wasmtime on native) for all agents with identity.signedBy). AXP messages queued for an EXECUTING agent are NOT concurrent executions — they wait until the agent returns to IDLE."
    - "An AuthSession's expires_at is always strictly greater than its created_at."
    - "A Permission's status is always one of: declared, pending_approval, granted, revoked."
    - "Memory's lifecycle state is always one of: locked, unlocked, syncing. 'syncing' is a sub-state of 'unlocked' — the Vault key is available while syncing."
    - "An LLMProvider's state is always one of: configured, available, degraded, exhausted."
    - "An AgentPackage's state is always one of: built, published, available, deprecated, installed."

  temporal:
    - "An AXP message whose TTL has elapsed MUST NOT be delivered, even if queued."
    - "A LLM request MUST complete or fail within the provider's configured maxLatency before triggering a fallback."
    - "An agent execution MUST be killed after 30 seconds regardless of pending operations."
    - "A budget alert MUST be emitted before the budget reaches 100% (alert threshold is 80%)."
    - "The daily LLM cost counter resets at UTC 00:00 each day."
    - "The monthly LLM cost counter resets on the first day of each UTC calendar month at 00:00."
    - "If the best-matching agent for an intent is WAITING and no second-best exists, the intent holding period is at most 30 seconds before an error is returned to the user."

  transactional:
    - "Agent installation is all-or-nothing: if signature or hash verification fails, or if the user rejects permissions, no partial agent state is left in Cortex — as if installation never happened."
    - "A memory write that fails during encryption MUST NOT leave partial data in the Vault."
    - "An AXP message that fails signature verification MUST NOT be partially forwarded."
    - "If an audit log append fails after 3 retries, the agent action result is NOT rolled back — the action stands and the gap is logged."
    - "Permission rejection during installation is atomic — no record is created, no permissions stored, nothing persisted."

derived_tests:
  # --- user_authentication ---
  - given: "No AuthSession exists for the user"
    when: "User submits valid credentials to the auth module"
    then:
      - "A new AuthSession is created with status 'authenticated'"
      - "The session expires_at is in the future"
      - "The Vault remains locked (separate unlock step required)"

  - given: "No AuthSession exists for the user"
    when: "User submits invalid credentials"
    then:
      - "No AuthSession is created"
      - "An authentication error is returned"
      - "No agent can execute"

  - given: "An AuthSession exists but has expired"
    when: "An agent intent is triggered"
    then:
      - "The intent is not routed"
      - "The user is prompted to re-authenticate"

  # --- vault_unlock ---
  - given: "A valid AuthSession exists and Vault is locked; session.onExpiry = 'lock-vault'"
    when: "User provides the correct passphrase"
    then:
      - "Vault transitions to 'unlocked'"
      - "Memory tiers become accessible to agents"
      - "The derived key exists only in memory, not on disk"

  - given: "A valid AuthSession exists and Vault is locked"
    when: "User provides an incorrect passphrase"
    then:
      - "Vault remains locked"
      - "An error is returned indicating wrong passphrase"
      - "No memory data is accessible"

  - given: "Vault is unlocked; session.onExpiry = 'lock-vault'"
    when: "The AuthSession expires"
    then:
      - "The Vault key is zeroed from memory"
      - "Vault transitions to 'locked'"
      - "New agent executions are blocked"

  - given: "Vault is unlocked; session.onExpiry = 'block-intents-only'"
    when: "The AuthSession expires"
    then:
      - "Vault remains in 'unlocked' state"
      - "New agent intent executions are blocked"
      - "The Vault re-locks only on explicit logout or device lock"

  # --- agent_registration ---
  - given: "An @Agent class with a unique name, valid permissions, and valid version is defined"
    when: "The application starts"
    then:
      - "The agent is registered in the Cortex AgentRegistry with state INSTALLED"
      - "Intent embeddings are pre-computed for all @Intent patterns"
      - "An Ed25519 key pair is generated for the agent instance"
      - "All permissions transition to 'pending_approval'"

  - given: "Two @Agent classes with the same name are defined"
    when: "The application starts"
    then:
      - "Startup throws an error identifying the duplicate name"
      - "Neither agent is registered"

  - given: "An @Agent class that declares 'memory.read:*' permission"
    when: "The application starts"
    then:
      - "Startup throws an error indicating that memory.read:* is reserved for system agents"

  # --- permission_approval ---
  - given: "An agent is in INSTALLED state and the permission dialog is shown"
    when: "User clicks 'Reject' without approving any permissions"
    then:
      - "No agent record is created in Cortex"
      - "No permissions are stored"
      - "No partial state is persisted — clean abort"

  # --- permission_check ---
  - given: "An agent in EXECUTING state with permission 'memory.read:finance.*'"
    when: "The agent calls ctx.memory.query('finance.expenses', {})"
    then:
      - "The query is allowed to proceed"
      - "An AuditEntry is created with result 'success'"

  - given: "An agent in EXECUTING state without permission 'memory.read:calendar.*'"
    when: "The agent calls ctx.memory.foreign('calendar').query('events', {})"
    then:
      - "PermissionDenied is thrown"
      - "An AuditEntry is created with result 'denied'"
      - "No calendar data is returned"

  # --- intent_routing ---
  - given: "A user in an authenticated session types 'How much did I spend last month?'"
    when: "The input is submitted to the intent router"
    then:
      - "The finance agent's expense summary intent is matched with a score above threshold"
      - "Parameters are extracted (e.g. timeframe: 'last month')"
      - "The finance agent transitions from IDLE to ACTIVATED"

  - given: "No agent has an intent that matches the user's input above the similarity threshold"
    when: "The input is submitted to the intent router"
    then:
      - "No agent is activated"
      - "The user receives a 'no matching intent' response"
      - "A trace entry records the failed routing"

  - given: "An intent requires a parameter 'amount' (required: true) and the user input does not supply it"
    when: "The intent is matched"
    then:
      - "The agent is not invoked immediately"
      - "The user is asked to provide the missing 'amount' parameter"

  - given: "The best-matching agent is in WAITING state and no second-best agent exists"
    when: "A user submits intent input"
    then:
      - "Cortex holds the intent for up to 30 seconds waiting for the agent to return to IDLE"
      - "If the agent returns to IDLE within 30 seconds, it is activated normally"
      - "If 30 seconds elapse and the agent is still WAITING, the user receives 'Agent is busy, please try again'"

  - given: "Two intents from different agents have equal embedding scores AND equal reputation scores"
    when: "Cortex must select one"
    then:
      - "The intent from the agent with the alphabetically earlier name is selected"

  # --- agent_execution ---
  - given: "A finance agent is in ACTIVATED state with valid permissions and context"
    when: "The expense tracking intent handler is invoked"
    then:
      - "The handler executes in the agent sandbox (Web Worker for local dev agents without publisher signature; browser WebAssembly API or Wasmtime for marketplace agents with publisher signature)"
      - "An AXUI schema is returned and passed to Neo for rendering"
      - "An AuditEntry is created recording the action, model, tokens, latency, and cost"
      - "The agent transitions to IDLE and consecutive_failure_count resets to 0"

  - given: "An agent's intent handler runs for 31 seconds without completing"
    when: "The 30-second timeout elapses"
    then:
      - "The sandbox kills the execution (Web Worker terminated in dev mode; WebAssembly instance or Wasmtime instance terminated in Phase 2+)"
      - "consecutive_failure_count is incremented"
      - "If this is the third consecutive failure within 5 minutes: the agent transitions to DISABLED"
      - "An AuditEntry is created with result 'error'"
      - "The user receives an error notification"

  - given: "An agent has had 2 consecutive failures within 5 minutes and a third failure occurs"
    when: "The third execution fails"
    then:
      - "consecutive_failure_count reaches 3"
      - "The agent transitions to DISABLED (circuit breaker)"
      - "An AuditEntry is created with result 'error'"

  - given: "An agent had 2 consecutive failures but the 3rd execution succeeds"
    when: "The execution completes successfully"
    then:
      - "consecutive_failure_count resets to 0"
      - "The agent transitions to IDLE normally"
      - "The agent is NOT disabled"

  # --- memory_write ---
  - given: "A finance agent with 'memory.write:finance.*' permission and Vault in 'unlocked' state"
    when: "The agent calls ctx.memory.store('finance.expenses', { amount: 50, category: 'food' })"
    then:
      - "The document is encrypted with AES-256-GCM and persisted to SQLite/OPFS"
      - "A document ID is returned"
      - "An AuditEntry is created for the write"

  - given: "Vault is in 'syncing' sub-state and an agent calls ctx.memory.store()"
    when: "The write is applied"
    then:
      - "The write is applied locally immediately without waiting for sync to complete"
      - "A document ID is returned"
      - "The CRDT strategy will reconcile any conflict with remote data on the next sync cycle"

  - given: "A finance agent's episodic memory namespace is at exactly 500 MB"
    when: "The agent calls ctx.memory.store() with a new document"
    then:
      - "The write is rejected with a storage limit error"
      - "No partial data is written"

  - given: "An agent's semantic memory namespace has exactly 100,000 vectors"
    when: "The agent calls ctx.memory.semanticStore() with new text"
    then:
      - "The write is rejected with a vector count limit error"

  # --- axp_send ---
  - given: "Calendar agent has axp.send:finance permission and finance agent is IDLE"
    when: "Calendar agent sends an axp.request for the travel budget"
    then:
      - "Cortex verifies the sender's Ed25519 signature"
      - "Cortex verifies the axp.send:finance permission"
      - "The request is recorded in the audit log"
      - "The finance agent processes the request and returns a response"
      - "The calendar agent receives the response"

  - given: "Calendar agent sends an axp.request and the finance agent is currently EXECUTING"
    when: "Cortex receives the message"
    then:
      - "The message is verified and enqueued for the finance agent"
      - "When finance agent returns to IDLE, the queued message is delivered and triggers a fresh activation"
      - "This is not a concurrent execution — it is sequential"

  - given: "The AXP queue for an agent already holds 50 messages and a 51st arrives"
    when: "Cortex attempts to enqueue the new message"
    then:
      - "The oldest queued message is dropped"
      - "A warning is written to the audit log"
      - "The new message is enqueued"

  - given: "An agent sends an AXP message with an invalid Ed25519 signature"
    when: "Cortex receives the message"
    then:
      - "The message is dropped"
      - "An AuditEntry is created with result 'denied'"
      - "The target agent never sees the message"

  - given: "An agent sends an AXP request with TTL of 5000ms and the target agent does not respond within 5000ms"
    when: "The TTL expires"
    then:
      - "The message is dropped (whether queued or in-flight)"
      - "The sender receives axp.error with reason TIMEOUT"

  # --- axp_delegate ---
  - given: "A productivity agent delegates flight search to travel agent and budget check to finance agent concurrently"
    when: "Promise.all([ctx.axp.delegate('travel', ...), ctx.axp.delegate('finance', ...)]) is called"
    then:
      - "Both delegations execute concurrently"
      - "Both DELEGATE messages are recorded in the audit log"
      - "Each target agent independently executes and returns a DELEGATE_RESULT"
      - "The productivity agent receives both results"

  - given: "A delegating agent targets an agent that is in DISABLED state"
    when: "ctx.axp.delegate() is called"
    then:
      - "axp.error with reason AGENT_UNAVAILABLE is returned immediately"
      - "No sub-task execution occurs"

  # --- llm_routing ---
  - given: "An agent submits a request classified as 'simple' with no capability requirements"
    when: "Synapse routes the request"
    then:
      - "A local model (phi-3-mini) or the cheapest configured model is selected"
      - "The model cost does not exceed the 'simple' strategy maxCost of $0.001 per 1k tokens"

  - given: "An agent submits a request with hint 'complex'"
    when: "Synapse routes the request"
    then:
      - "A powerful model (claude-sonnet or gpt-4o equivalent) is selected"
      - "The selection prioritizes reasoning capability"

  - given: "All configured cloud LLM providers fail on a request"
    when: "The fallback chain is exhausted after 2 retries"
    then:
      - "The task is queued for later retry"
      - "An error is returned to the agent with the failure reason"

  # --- budget_management ---
  - given: "Daily LLM spend has reached exactly 80% of the configured daily budget"
    when: "The next LLM request completes"
    then:
      - "onBudgetAlert(80, 'anthropic') callback is invoked"
      - "The request still succeeds"

  - given: "Daily LLM spend has reached 100% of the configured daily budget"
    when: "An agent submits an LLM request"
    then:
      - "Synapse routes the request to local-only models"
      - "If no local model is available, the task is queued"

  - given: "The daily LLM budget was exhausted and UTC midnight passes"
    when: "UTC 00:00 occurs"
    then:
      - "The daily cost counter resets to 0"
      - "LLMProvider transitions from 'exhausted' to 'available'"
      - "Cloud model requests resume normally"

  # --- axui_render ---
  - given: "A finance agent with ui.render permission returns an AXUI card schema with a valid root node and ttl of 60000ms"
    when: "Neo processes the schema"
    then:
      - "The schema is validated against AXUI 1.0 JSON Schema"
      - "Semantic color tokens are resolved to theme values"
      - "A React component is produced and inserted into the dashboard"
      - "A 60-second dismissal timer is started"

  - given: "An active micro-app's TTL of 60000ms expires"
    when: "The timer fires"
    then:
      - "The micro-app is removed from the dashboard surface"
      - "An AXUI 'dismiss' event is sent to Cortex"
      - "An AuditEntry is created with action 'micro_app_dismissed' and reason 'ttl_expired'"
      - "The owning agent is NOT re-invoked"

  - given: "An active micro-app has refresh = 30000ms (30s)"
    when: "The refresh interval fires"
    then:
      - "The originating intent handler is re-invoked with the same agent, intent name, and original parameters"
      - "The returned schema replaces the existing micro-app in the dashboard"

  - given: "An agent returns an AXUI schema with an unknown node type 'crypto-widget' (not registered)"
    when: "Neo processes the schema"
    then:
      - "The unknown node is rendered as an error placeholder"
      - "The rest of the schema renders correctly"

  - given: "An agent without ui.fullscreen permission returns an AXUI schema with surface 'fullscreen'"
    when: "Neo processes the schema"
    then:
      - "PermissionDenied is thrown"
      - "The micro-app is not rendered"

  - given: "A persistent: true micro-app is active and the user logs out (session invalidated)"
    when: "The session is invalidated with session.onExpiry = 'lock-vault'"
    then:
      - "The Vault transitions to 'locked'"
      - "The persistent micro-app is removed from the dashboard surface"

  # --- agent_install_from_marketplace ---
  - given: "A valid AgentPackage exists in Zion with a correct publisher signature and matching code hash"
    when: "The end-user installs it and approves all permissions"
    then:
      - "The agent is registered in Cortex with state IDLE"
      - "A unique Ed25519 key pair is generated for this instance"
      - "Reputation metrics are initialized"

  - given: "An AgentPackage has a code hash that does not match the downloaded bundle's SHA-256"
    when: "The installation proceeds"
    then:
      - "Installation is aborted with SecurityError('Code hash mismatch')"
      - "No agent state is left in Cortex — clean abort"

  - given: "The user declines to approve the permissions during agent installation"
    when: "The permission dialog is dismissed with rejection"
    then:
      - "Installation is aborted atomically"
      - "No agent record is created in Cortex"
      - "No permissions are stored"
      - "No partial state is persisted"

  # --- agent_publish ---
  - given: "A developer runs 'atlax publish' for an agent with version '1.0.0' already in the registry"
    when: "The upload is attempted"
    then:
      - "The upload is rejected with a version conflict error"
      - "The existing package is unchanged"

  - given: "Static security analysis detects eval() usage in the agent code"
    when: "The developer runs 'atlax publish'"
    then:
      - "The package is not uploaded"
      - "The developer receives a security analysis report identifying the eval() usage"

  # --- agent_deprecate ---
  - given: "A package is in 'available' state and the publisher deprecates it"
    when: "agent_deprecate is invoked"
    then:
      - "The package transitions to 'deprecated' state"
      - "Existing installed agent instances continue running without interruption"

  - given: "A user has the deprecated package installed and opens the app after the next Zion sync"
    when: "The Zion sync completes"
    then:
      - "A persistent warning is shown: 'This agent has been deprecated by its publisher.'"
      - "The agent is not automatically disabled"

  # --- audit_log_entry ---
  - given: "The audit log contains N entries with a valid hash chain"
    when: "A new agent action completes"
    then:
      - "A new AuditEntry is appended as entry N+1"
      - "The new entry's previousHash equals the hash of entry N"
      - "The new entry's entry_hash equals SHA-256 of the full entry including previousHash"
      - "The new entry's signature is valid for the acting agent's key"

  - given: "An audit log entry is tampered with by modifying the 'action' field"
    when: "The user exports and verifies the audit log"
    then:
      - "The hash chain verification fails at the tampered entry"
      - "The break point is reported"

  - given: "An audit log append fails on all 3 retry attempts"
    when: "The last retry exhausts"
    then:
      - "The agent is transitioned to DISABLED"
      - "An error is surfaced to the developer via the OpenTelemetry observability channel"
      - "The agent action result is NOT rolled back"

  # --- permission_revocation ---
  - given: "A user revokes memory.write:finance.* from the finance agent while it is IDLE, and memory.write:finance.* is required by the finance agent's trackExpense @Intent handler"
    when: "The revocation is applied"
    then:
      - "The permission status changes to 'revoked'"
      - "The finance agent transitions to DISABLED (permission required by an @Intent)"
      - "The revocation is recorded in the audit log"

  - given: "A user revokes notify.push from the finance agent while it is IDLE, and notify.push is not required by any @Intent handler (it is only used in a background hook)"
    when: "The revocation is applied"
    then:
      - "The permission status changes to 'revoked'"
      - "The finance agent stays IDLE (permission not required by any @Intent)"
      - "The agent simply loses the notify.push capability"

  - given: "A user revokes a permission from an agent while it is in EXECUTING state"
    when: "The revocation is applied"
    then:
      - "The agent transitions to DISABLED"
      - "Any pending AXP messages from the agent are cancelled"

  # --- reputation_update ---
  - given: "A finance agent's combined reputation score falls from 0.21 to 0.19 after an execution error"
    when: "The reputation is recalculated"
    then:
      - "The agent is automatically disabled (transitions to DISABLED)"
      - "A system reputation warning is emitted by Cortex using the AXUI notification surface"

  - given: "A finance agent with reputation score 0.45 is disabled and later re-enabled by the user"
    when: "The user re-approves permissions and the agent transitions to IDLE"
    then:
      - "The reputation score remains at 0.45 — it is not reset"

  # --- cloud_sync ---
  - given: "A user has enabled cloud sync (crdt strategy) and modifies a preference on device A while sync is in progress"
    when: "The write is applied"
    then:
      - "The write is applied locally on device A immediately"
      - "The Vault is in 'syncing' sub-state but local writes are not blocked"
      - "CRDT will resolve any conflict with remote data on the next sync cycle"

  - given: "A user attempts to sync but the sync provider is unreachable"
    when: "The sync is attempted"
    then:
      - "The local data remains unchanged"
      - "Vault returns to 'unlocked' state (not 'locked')"
      - "Sync is retried automatically when connectivity is restored"

  # --- mcp_tool_invocation ---
  - given: "A calendar agent with tools.google_calendar permission invokes createEvent on the MCP server"
    when: "ctx.tools.invoke('google_calendar', 'createEvent', params) is called"
    then:
      - "The Bridge forwards the call to the google_calendar MCP server"
      - "The response is validated by @atlax/prompt-guard"
      - "The validated result is returned to the agent"
      - "An AuditEntry records the tool name, method, and result"

  - given: "An MCP tool response contains a prompt injection payload"
    when: "@atlax/prompt-guard validates the response"
    then:
      - "The response is blocked"
      - "The agent receives a sanitized error instead of the injected content"

  # --- LLMProvider lifecycle ---
  - given: "An LLM provider has 3 consecutive API call failures within 60 seconds"
    when: "The third failure is recorded"
    then:
      - "The provider transitions from 'available' to 'degraded'"
      - "The next successful call auto-recovers to 'available'"

# =============================================================================
# METADATA
# =============================================================================

metadata:
  version: "1.0.0"
  created: "2026-02-28T00:00:00Z"
  last_modified: "2026-02-28"
  last_verified: "2026-02-28T16:00:00Z"
  verification_status: "passed"

  quality_attributes:
    concurrent_users: "Single user per device (local-first OS). Multi-device via opt-in cloud sync."
    response_time: >
      Intent routing and memory queries: under 20ms typical.
      LLM calls: trivial (no LLM) under 5ms; simple (local model) under 500ms;
      moderate under 2000ms; complex under 5000ms.
      AXUI render: under 50ms typical (neo_render_duration histogram).
    data_durability: >
      Working memory: session-scoped, intentionally lost on session close.
      Episodic memory: persisted and encrypted locally; durable across app restarts.
      Semantic memory: persisted and encrypted locally; durable across app restarts.
      Preferences: persisted locally; optionally synced E2E encrypted to cloud.
      Audit log: append-only, durable, tamper-evident.
    maintainers: "Open-source community (MIT). Core team maintains @atlax/* packages. TypeScript and React/RN expertise required."
    change_frequency: >
      Most likely to change: LLM provider landscape (new models, pricing).
      AXUI schema node types (new UI primitives in Phase 4).
      Reputation algorithm weights.
      Zion marketplace features.

  technical_constraints:
    platform: "Web (PWA/SPA via React + Vite) and Mobile (React Native via Expo). Desktop via Tauri is Phase 4. Core engine language: Rust->WASM (Phase 2+). Phase 0-1 is 100% TypeScript with WASM dependencies."
    technology_mandates:
      - "TypeScript (primary language, all packages)"
      - "Rust (Phase 2+ core engine: Cortex, AXP, Bastion, Vault, Synapse compiled to WASM)"
      - "wasm-bindgen (TypeScript<->Rust WASM bindings for web)"
      - "napi-rs (TypeScript<->Rust native bindings for mobile/desktop)"
      - "Wasmtime (embedded in Rust core — executes agent.wasm on mobile/desktop native only; web uses browser native WebAssembly API)"
      - "Javy (TypeScript/JavaScript -> QuickJS -> .wasm compiler, used by atlax build for Phase 2+ agent compilation)"
      - "QuickJS (JS interpreter embedded in agent.wasm by Javy)"
      - "React (web UI rendering in @atlax/neo)"
      - "React Native + Expo (mobile rendering in @atlax/neo)"
      - "Ed25519 (cryptographic identity for agents and AXP message signing)"
      - "AES-256-GCM (Vault encryption at rest)"
      - "Argon2id (Vault key derivation from user passphrase)"
      - "SHA-256 (code hash and audit log chaining)"
      - "MessagePack (AXP message serialization)"
      - "UUID v7 (timestamp-ordered IDs for AXP messages and audit entries)"
      - "SQLite via OPFS (web episodic memory backend)"
      - "hnswlib-wasm (web semantic memory vector store)"
      - "hnswlib-node (mobile semantic memory vector store)"
      - "ONNX Runtime Web/Mobile (local embedding inference for all-MiniLM-L6-v2)"
      - "all-MiniLM-L6-v2 (~25MB, 384 dimensions, local embeddings)"
      - "Web Workers (Phase 0-1 web agent sandbox isolation)"
      - "JSC/Hermes isolates (Phase 0-1 mobile agent sandbox isolation)"
      - "OpenTelemetry (observability metrics and traces)"
      - "MCP (Model Context Protocol, for external tool integration via @atlax/bridge)"
      - "Vite (web bundler)"
      - "Expo Router (mobile routing)"
      - "@atlax/prompt-guard (standalone package for prompt injection protection; used internally by Bastion and available independently to developers)"
      - "@atlax/dashboard (separate optional package from @atlax/neo; provides Ambient Dashboard via defineDashboard())"
    integrations:
      - "LLM providers: Anthropic (claude-sonnet, claude-haiku), OpenAI (gpt-4o, gpt-4o-mini), local runtimes (WebLLM, Ollama)"
      - "MCP servers: any MCP-compatible tool server (e.g. google-calendar, github via @anthropic/mcp-*)"
      - "Cloud sync provider: atlax-cloud (hosted) or self-hosted compatible server"
      - "Zion marketplace registry (hosted or self-hosted)"
      - "A2A Bridge (Phase 3): for cross-vendor agent communication with external A2A agents"
      - "Web Speech API (web voice input — platform-level, not per-agent)"
      - "expo-speech (mobile voice input — platform-level, not per-agent)"
    regulations:
      - "MIT License — all framework code must remain MIT-licensed"
      - "Privacy by design: user data stays on-device by default; cloud sync is always E2E encrypted"
      - "No user data is sent to any server without explicit user opt-in"
    timeline: "Phase 0 (Weeks 1-6), Phase 1 (Weeks 7-14), Phase 2 (Weeks 15-22), Phase 3 (Weeks 23-30), Phase 4 (Weeks 31+)"
    team_expertise: "TypeScript, React, React Native, Expo, cryptography fundamentals, LLM APIs"

