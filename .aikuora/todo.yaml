  - id: 2
    name: "AXUI Rendering, Dashboard, Voice and Cloud Sync"
    status: pending
    tasks:
      - id: P2-01
        title: "Implement axui_render use case and @atlax/neo web renderer"
        description: >
          Implement packages/core/src/application/ui/axuiRenderUseCase.ts and
          the full packages/neo/src/web/ React renderer. Validates AXUI schema
          version (axui/1.0), root node type (17 valid types), action types
          (9 valid types). Validates agent holds ui.render permission; ui.fullscreen
          for fullscreen surface; ui.notify for notification surface. Resolves
          semantic color tokens to theme values. Maps all 17 node types to React
          components. Wires action handlers (agent.invoke routes through Cortex).
          TTL timer: removes micro-app on expiry, sends dismiss event to Cortex,
          creates AuditEntry (micro_app_dismissed, ttl_expired) — agent NOT
          re-invoked. Refresh interval: re-invokes originating intent with same
          parameters. Persistent micro-app: survives session changes, removed on
          agent DISABLED or Vault locked. Unknown node type: renders error
          placeholder. Updates neo_render_duration metric. Write tests for all
          derived_tests in spec.yaml axui_render.
        spec_ref: "behaviors.axui_render"
        packages: ["packages/core", "packages/neo"]
        status: pending
        depends_on: ["P1-06", "P1-16"]

      - id: P2-02
        title: "Implement dashboard_prioritization use case and @atlax/dashboard"
        description: >
          Implement packages/core/src/application/ui/dashboardPrioritizationUseCase.ts
          and the full packages/dashboard package. defineDashboard() configures
          the layout engine with widget list, prioritization rules, and theme.
          Priority rules evaluated in order; first match wins. Urgent micro-apps
          position at top with pulse animation. Pinned widgets always visible.
          If no rule matches: append at default position. Requires
          @atlax/dashboard to be installed and defineDashboard() called — @atlax/neo
          works without @atlax/dashboard. Updates neo_user_interaction metric
          on user interaction. Write tests for rule evaluation order and urgent
          positioning.
        spec_ref: "behaviors.dashboard_prioritization"
        packages: ["packages/core", "packages/dashboard"]
        status: pending
        depends_on: ["P2-01"]

      - id: P2-03
        title: "Implement voice_input use case"
        description: >
          Implement packages/core/src/application/ui/voiceInputUseCase.ts.
          Accepts speech input via platform-level Web Speech API (web) or
          expo-speech (mobile). Transcribes speech to text. Routes transcribed
          text through the standard intent_routing pipeline. microphone.read is
          a platform-level permission held by the host app — Bastion does NOT
          check it per-agent. Records voice input event in OpenTelemetry trace.
          On transcription failure: show error, prompt user to retry or use
          text input. Write tests for successful transcription routing and
          failure handling.
        spec_ref: "behaviors.voice_input"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-07"]

      - id: P2-04
        title: "Implement full atlax CLI — build and publish commands"
        description: >
          Implement atlax build: compiles agent TypeScript to agent.wasm via
          Javy (invokes javy compile as child process, embedding QuickJS).
          Produces .axpkg artifact (code bundle + signed manifest). Computes
          SHA-256 of code bundle and embeds in manifest. Implement atlax agent
          create: scaffolds a new agent directory with manifest, intent, and
          index.ts stubs. Implement atlax agent test: runs agent tests via
          vitest with @atlax/testing mocks. Implement atlax agent audit:
          exports and verifies the agent's audit log hash chain.
        spec_ref: null
        packages: ["packages/cli"]
        status: pending
        depends_on: ["P1-24"]

      - id: P2-05
        title: "Implement cloud_sync use case"
        description: >
          Implement packages/core/src/application/vault/cloudSyncUseCase.ts.
          When user opts in (sync.enabled = true), transitions Memory to syncing
          sub-state during the sync cycle. Encrypts the preferences tier
          on-device before upload (server never receives plaintext). Uploads
          encrypted blob to sync provider via ISyncProviderAdapter. Downloads
          and decrypts on the receiving device. Resolves conflicts via CRDT
          (default) or last-write-wins. Only the preferences tier syncs in v1
          (episodic and semantic are local-only). Local writes proceed normally
          during sync — CRDT handles conflicts on next cycle. Vault returns to
          unlocked on sync completion or failure. On unreachable provider:
          retry on reconnect, Vault stays unlocked. If encryption fails: abort
          upload, Vault stays unlocked. Write tests for all derived_tests in
          spec.yaml cloud_sync.
        spec_ref: "behaviors.cloud_sync"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-10", "P1-03"]

      - id: P2-06
        title: "Implement @atlax/neo native renderer (React Native)"
        description: >
          Implement packages/neo/src/native/ React Native renderer. Maps all
          17 AXUI node types to React Native components (View, Text, Image,
          ScrollView, etc.). Shares schema validation and node type registry
          from packages/neo/src/shared/. Wires the conditional export
          @atlax/neo/native in package.json with react-native condition for
          Metro bundler. Verify with Expo Router integration that AXUI schemas
          render correctly on mobile. peerDependency: react-native (not bundled).
        spec_ref: null
        packages: ["packages/neo"]
        status: pending
        depends_on: ["P2-01"]

  - id: 3
    name: "Marketplace (Zion Client)"
    status: pending
    tasks:
      - id: P3-01
        title: "Implement agent_install_from_marketplace use case"
        description: >
          Implement packages/core/src/application/marketplace/
          agentInstallUseCase.ts and the ZionClient in packages/core/src/
          infrastructure/zion/. Fetches AgentPackage from Zion HTTP API.
          Verifies manifest_signature against publisher_key (Ed25519). Computes
          SHA-256 of downloaded code bundle, compares to manifest.payload.hash
          — mismatch aborts with SecurityError. On success: presents permission
          dialog, calls permission_approval use case. On user rejection:
          atomically abort — no agent record, no permissions, no state persisted.
          On approval: generate unique Ed25519 key pair for this agent instance,
          set identity.signedBy to publisher fingerprint, register in Cortex
          with state IDLE, record metrics initialization. All failures are
          all-or-nothing. Write tests for all derived_tests in spec.yaml.
        spec_ref: "behaviors.agent_install_from_marketplace"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P1-05", "P1-16"]

      - id: P3-02
        title: "Implement agent_publish use case and atlax publish CLI command"
        description: >
          Implement packages/core/src/application/marketplace/
          agentPublishUseCase.ts and the atlax publish CLI command. Computes
          SHA-256 of code bundle. Signs manifest with publisher's Ed25519 key.
          Client-side static security analysis: scan for undeclared permissions
          referenced in code, direct fetch() without Bridge, eval/new Function
          usage, hardcoded secrets patterns. If analysis fails: do not upload,
          report findings to developer. If passes: upload to Zion HTTP API.
          Zion runs independent second scan (defense-in-depth). Package version
          is immutable — duplicate version upload is rejected. If Zion server
          scan fails: uploaded but not listed; developer notified. Write tests
          for all derived_tests in spec.yaml.
        spec_ref: "behaviors.agent_publish"
        packages: ["packages/core", "packages/cli"]
        status: pending
        depends_on: ["P3-01", "P2-04"]

      - id: P3-03
        title: "Implement agent_deprecate use case"
        description: >
          Implement packages/core/src/application/marketplace/
          agentDeprecateUseCase.ts. Validates actor is the package's publisher
          or a Zion admin. Transitions package to deprecated state in the Zion
          registry via ZionClient. On next Zion sync for each user with this
          package installed: show persistent warning 'This agent has been
          deprecated by its publisher.' No automatic disable or uninstall.
          Existing installed instances continue running. Write tests for
          authorization check, non-available package rejection, and deprecation
          state transition.
        spec_ref: "behaviors.agent_deprecate"
        packages: ["packages/core"]
        status: pending
        depends_on: ["P3-01"]

      - id: P3-04
        title: "Implement Zion client type stubs and HTTP contract"
        description: >
          Implement all types and HTTP client stubs in packages/core/src/
          infrastructure/zion/. Define IZionClient port (application layer).
          Define AgentPackage, SignedManifest, ZionListResponse TypeScript
          types. Implement ZionHttpClient adapter (fetch-based) with endpoints:
          GET /packages/:name, POST /packages (publish), PATCH /packages/:name
          (deprecate). Document the HTTP contract as TypeScript types and JSDoc
          — no OpenAPI tooling required. The actual Zion server is in a
          separate repo (per ADR-010).
        spec_ref: null
        packages: ["packages/core"]
        status: pending
        depends_on: ["P3-01"]

  - id: 4
    name: "Rust Core Engine (WASM)"
    status: pending
    tasks:
      - id: P4-01
        title: "Implement Rust Vault module (AES-256-GCM + Argon2id)"
        description: >
