phases:
  - id: 0
    name: "Repository Scaffold and Tooling"
    status: pending
    tasks:
      - id: P0-01
        title: "Initialize moonrepo workspace"
        description: >
          Create .moon/workspace.yml and .moon/toolchain.yml. Configure the
          workspace to discover all packages in packages/* and crates/*. Set
          up root-level moon tasks (build, test, lint, format, typecheck) that
          fan out to all packages. Verify moon version via proto.
        spec_ref: null
        packages: [".moon/"]
        status: pending

      - id: P0-02
        title: "Pin toolchain versions with prototools"
        description: >
          Create .prototools at the repo root. Pin Node.js LTS (determine exact
          LTS version), pnpm latest (determine via proto), and Rust stable.
          Verify proto install bootstraps the full toolchain from scratch.
          Document the bootstrap steps in a brief comment at the top of
          .prototools.
        spec_ref: null
        packages: [".prototools"]
        status: pending

      - id: P0-03
        title: "Configure pnpm workspace"
        description: >
          Create pnpm-workspace.yaml listing packages: ["packages/*"]. Do NOT
          put workspace settings in .npmrc — per ADR-003 and pnpm docs, all
          workspace settings go in pnpm-workspace.yaml. Create the root
          package.json with name "atlax-monorepo", private: true, and the
          engines field pinning the Node.js version from .prototools.
        spec_ref: null
        packages: ["pnpm-workspace.yaml"]
        status: pending

      - id: P0-04
        title: "Scaffold all TypeScript package skeletons"
        description: >
          Create the directory structure and minimal package.json for each
          package: packages/core (@atlax/core), packages/neo (@atlax/neo),
          packages/prompt-guard (@atlax/prompt-guard), packages/dashboard
          (@atlax/dashboard), packages/bridge (@atlax/bridge),
          packages/testing (@atlax/testing), packages/cli (atlax). Each
          package.json must include: name, version (0.1.0), type: module,
          exports map stub, and moon.yml with build/test/lint/format tasks.
          Create src/index.ts with a single TODO comment in each package.
        spec_ref: null
        packages:
          - "packages/core"
          - "packages/neo"
          - "packages/prompt-guard"
          - "packages/dashboard"
          - "packages/bridge"
          - "packages/testing"
          - "packages/cli"
        status: pending

      - id: P0-05
        title: "Configure shared TypeScript toolchain"
        description: >
          Create the root tsconfig.base.json with strict: true,
          exactOptionalPropertyTypes: true, noUncheckedIndexedAccess: true,
          target: ES2022, module: NodeNext, moduleResolution: NodeNext.
          Create tsconfig.json in each package extending the base config with
          appropriate lib and include fields. Install typescript as a root
