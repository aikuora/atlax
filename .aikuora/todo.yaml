      - id: P0-11
        title: "Scaffold Rust crate skeleton (Phase 2 placeholder)"
        description: >
          Create crates/atlax-core/Cargo.toml with the crate name atlax-core,
          edition 2021, and lib crate-type [cdylib, rlib] for WASM. Create
          crates/atlax-core/src/lib.rs with empty module declarations for
